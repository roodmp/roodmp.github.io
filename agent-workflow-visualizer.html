  <style>
    /* ── Layout ── */
    .viz-container {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
      padding-bottom: var(--space-16);
    }

    .page-header {
      margin-bottom: var(--space-8);
    }

    .page-header h1 {
      font-size: var(--text-3xl);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }

    .page-header p {
      font-size: var(--text-base);
      color: var(--text-secondary);
      margin: 0;
    }

    /* ── Template Selector ── */
    .template-selector {
      margin-bottom: var(--space-6);
    }

    .template-selector label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--panda-400);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-3);
    }

    .template-tabs {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .template-tab {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .template-tab:hover {
      color: var(--text-primary);
      border-color: var(--surface-border-accent);
      background: var(--bg-hover);
    }

    .template-tab.active {
      color: var(--text-primary);
      border-color: var(--accent-500);
      background: rgba(74, 103, 133, 0.12);
    }

    .template-tab svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Workflow Canvas ── */
    .workflow-canvas {
      position: relative;
      min-height: 420px;
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
      overflow: hidden;
    }

    .workflow-canvas svg.edge-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .nodes-layer {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    /* ── Node Styles ── */
    .wf-node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elevated);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-normal);
      min-width: 160px;
      max-width: 220px;
      user-select: none;
    }

    .wf-node:hover {
      border-color: var(--surface-border-accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .wf-node:focus-visible {
      outline: 2px solid var(--accent-400);
      outline-offset: 2px;
    }

    .wf-node.active {
      border-color: var(--panda-400);
      box-shadow: 0 0 20px rgba(232, 132, 90, 0.25), 0 0 40px rgba(232, 132, 90, 0.1);
    }

    .wf-node.completed {
      border-color: var(--success);
      opacity: 0.85;
    }

    .wf-node.future {
      opacity: 0.4;
    }

    .node-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .node-icon svg {
      width: 16px;
      height: 16px;
    }

    .node-icon.blue { background: rgba(74, 103, 133, 0.2); color: var(--accent-300); }
    .node-icon.orange { background: rgba(232, 132, 90, 0.2); color: var(--panda-300); }
    .node-icon.green { background: rgba(124, 185, 126, 0.2); color: var(--success); }
    .node-icon.yellow { background: rgba(212, 168, 87, 0.2); color: var(--warning); }
    .node-icon.light { background: rgba(139, 167, 189, 0.15); color: var(--accent-200); }

    .node-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .node-sublabel {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 1px;
    }

    /* ── SVG Edges ── */
    .edge-path {
      fill: none;
      stroke: var(--surface-border);
      stroke-width: 2;
      transition: stroke 0.3s ease;
    }

    .edge-path.active {
      stroke: var(--panda-400);
      stroke-width: 2.5;
    }

    .edge-path.completed {
      stroke: var(--success);
    }

    .edge-flow {
      fill: none;
      stroke: var(--panda-400);
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      opacity: 0;
    }

    .edge-flow.active {
      opacity: 1;
      animation: dashFlow 0.8s linear infinite;
    }

    @keyframes dashFlow {
      to { stroke-dashoffset: -14; }
    }

    .data-token {
      r: 4;
      fill: var(--panda-400);
      opacity: 0;
      filter: drop-shadow(0 0 4px rgba(232, 132, 90, 0.6));
    }

    .data-token.active {
      opacity: 1;
    }

    /* ── Playback Controls ── */
    .playback-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-6);
    }

    .playback-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--bg-elevated);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .playback-btn:hover {
      color: var(--text-primary);
      border-color: var(--surface-border-accent);
      background: var(--bg-hover);
    }

    .playback-btn.primary {
      background: var(--accent-500);
      border-color: var(--accent-500);
      color: white;
    }

    .playback-btn.primary:hover {
      background: var(--accent-600);
      box-shadow: var(--shadow-accent);
    }

    .playback-btn svg {
      width: 16px;
      height: 16px;
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--bg-elevated);
      border-radius: var(--radius-full);
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-500), var(--panda-400));
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
      width: 0%;
    }

    .step-label {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      white-space: nowrap;
      min-width: 52px;
      text-align: center;
    }

    .speed-btn {
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      font-weight: 500;
      color: var(--text-tertiary);
      background: none;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .speed-btn:hover,
    .speed-btn.active {
      color: var(--text-primary);
      border-color: var(--accent-500);
    }

    /* ── Detail Panel ── */
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100%;
      background: var(--bg-secondary);
      border-left: 1px solid var(--surface-border);
      z-index: 120;
      transform: translateX(100%);
      transition: transform var(--transition-slow);
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .detail-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-6);
      border-bottom: 1px solid var(--surface-border);
    }

    .detail-panel-header h3 {
      font-size: var(--text-lg);
      margin: 0;
    }

    .detail-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .detail-close:hover {
      color: var(--text-primary);
      border-color: var(--surface-border-accent);
    }

    .detail-close svg {
      width: 16px;
      height: 16px;
    }

    .detail-body {
      padding: var(--space-6);
    }

    .detail-node-type {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 500;
      border-radius: var(--radius-full);
      margin-bottom: var(--space-4);
    }

    .detail-section {
      margin-bottom: var(--space-6);
    }

    .detail-section h4 {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .detail-section p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.7;
      margin: 0;
    }

    .detail-example {
      padding: var(--space-3) var(--space-4);
      background: var(--bg-primary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--accent-300);
      line-height: 1.6;
      white-space: pre-wrap;
      margin-top: var(--space-2);
    }

    /* ── Detail Panel Overlay ── */
    .detail-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 110;
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-slow);
    }

    .detail-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    /* ── Concepts Grid ── */
    .concepts-section {
      margin-top: var(--space-12);
      padding-top: var(--space-8);
      border-top: 1px solid var(--surface-border-subtle);
    }

    .concepts-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--panda-400);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-2);
    }

    .concepts-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: var(--space-6);
    }

    .concepts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
    }

    .concept-card {
      padding: var(--space-5);
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      transition: border-color var(--transition-fast);
    }

    .concept-card:hover {
      border-color: var(--surface-border-accent);
    }

    .concept-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(74, 103, 133, 0.12);
      border-radius: var(--radius-md);
      color: var(--accent-300);
      margin-bottom: var(--space-3);
    }

    .concept-icon svg {
      width: 18px;
      height: 18px;
    }

    .concept-card h4 {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-2);
    }

    .concept-card p {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .workflow-canvas {
        min-height: 500px;
      }

      .wf-node {
        min-width: 130px;
        max-width: 170px;
        padding: var(--space-2) var(--space-3);
        gap: var(--space-2);
      }

      .node-icon {
        width: 26px;
        height: 26px;
      }

      .node-icon svg {
        width: 13px;
        height: 13px;
      }

      .node-label {
        font-size: 10px;
      }

      .node-sublabel {
        font-size: 9px;
      }

      .detail-panel {
        width: 100%;
      }

      .concepts-grid {
        grid-template-columns: 1fr;
      }

      .template-tabs {
        gap: var(--space-1);
      }

      .template-tab {
        font-size: var(--text-xs);
        padding: var(--space-2) var(--space-3);
      }

      .playback-bar {
        gap: var(--space-2);
        padding: var(--space-2) var(--space-3);
      }

      .step-label {
        min-width: 40px;
        font-size: 10px;
      }
    }

    @media (max-width: 480px) {
      .template-tab span.tab-text {
        display: none;
      }

      .template-tab svg {
        width: 16px;
        height: 16px;
      }

      .playback-btn {
        width: 32px;
        height: 32px;
      }
    }

    /* ── Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      .edge-flow.active {
        animation: none;
        opacity: 0.6;
      }

      .wf-node,
      .wf-node.active {
        transition: none;
        box-shadow: none;
      }

      .wf-node.active {
        border-color: var(--panda-400);
        outline: 2px solid var(--panda-400);
        outline-offset: 2px;
      }

      .data-token {
        display: none;
      }

      .detail-panel {
        transition: none;
      }

      .progress-fill {
        transition: none;
      }
    }
  </style>
</head>

  <script>
    // ═══════════════════════════════════════════════
    //  NODE TYPES
    // ═══════════════════════════════════════════════
    const NODE_TYPES = {
      userInput: {
        label: 'User Input',
        icon: 'message-circle',
        color: 'blue',
        description: 'The starting point of any agent workflow. A user submits a question, instruction, or task that the agent needs to handle.',
        realWorld: 'A developer asks: "Find all TODO comments in the codebase and create GitHub issues for each one."',
        keyIdea: 'Good agent design starts with understanding user intent. The input is parsed, and context (conversation history, system prompt, available tools) is assembled before reasoning begins.'
      },
      reasoning: {
        label: 'Reasoning',
        icon: 'cpu',
        color: 'orange',
        description: 'The agent\'s "thinking" step. The LLM analyzes the input, breaks down the task, and decides what actions to take. This is chain-of-thought in action.',
        realWorld: 'The agent thinks: "I need to search for TODO comments, then for each one, extract the description and file location, then call the GitHub API to create issues."',
        keyIdea: 'Reasoning is where the model plans its approach. More capable models produce better plans. Extended thinking or chain-of-thought prompting can improve reasoning quality.'
      },
      toolCall: {
        label: 'Tool Call',
        icon: 'terminal',

    // ═══════════════════════════════════════════════
    //  FEATHER ICON HELPER
    // ═══════════════════════════════════════════════
    function getIconSVG(name) {
      if (typeof feather !== 'undefined' && feather.icons[name]) {
        return feather.icons[name].toSvg({ width: 16, height: 16 });
      }
      // Fallback: simple circle
      return '<svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>';
    }

    // ═══════════════════════════════════════════════
    //  TEMPLATE TABS
    // ═══════════════════════════════════════════════
    function renderTemplateTabs() {
      templateTabs.innerHTML = '';
      Object.entries(WORKFLOWS).forEach(([key, wf]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'template-tab' + (key === currentWorkflow ? ' active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', key === currentWorkflow);
        btn.innerHTML = getIconSVG(wf.icon) + '<span class="tab-text">' + wf.name + '</span>';
        btn.addEventListener('click', () => switchWorkflow(key));
        templateTabs.appendChild(btn);
      });
    }

    // ═══════════════════════════════════════════════
    //  RENDER WORKFLOW
    // ═══════════════════════════════════════════════
    function renderWorkflow(key) {
      const wf = WORKFLOWS[key];
      if (!wf) return;

      // Clear
      nodesLayer.innerHTML = '';
      edgeLayer.innerHTML = '';

      // Calculate canvas dimensions from node positions
      let maxX = 0, maxY = 0;
      wf.nodes.forEach(n => {
        const nodeRight = n.x + 220;
        const nodeBottom = n.y + 70;
        if (nodeRight > maxX) maxX = nodeRight;
        if (nodeBottom > maxY) maxY = nodeBottom;
      });
      const canvasH = maxY + 40;
      canvas.style.minHeight = canvasH + 'px';
      edgeLayer.setAttribute('viewBox', '0 0 ' + canvas.offsetWidth + ' ' + canvasH);
      edgeLayer.style.height = canvasH + 'px';

      // Render nodes
      wf.nodes.forEach(n => {
        const nt = NODE_TYPES[n.type];
        const div = document.createElement('div');
        div.className = 'wf-node future';
        div.setAttribute('tabindex', '0');
        div.setAttribute('role', 'button');
        div.setAttribute('aria-label', nt.label + ': ' + n.label);
        div.dataset.nodeId = n.id;
        div.dataset.nodeType = n.type;
        div.dataset.step = n.step;

        // Position - use percentage-based x for responsiveness
        div.style.left = n.x + 'px';
        div.style.top = n.y + 'px';

        div.innerHTML = `
          <div class="node-icon ${nt.color}">${getIconSVG(nt.icon)}</div>
          <div>
            <div class="node-label">${n.label}</div>
            ${n.sublabel ? '<div class="node-sublabel">' + n.sublabel + '</div>' : ''}
          </div>
        `;

        div.addEventListener('click', () => openDetail(n, nt));
        div.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openDetail(n, nt);
          }
        });

        nodesLayer.appendChild(div);
      });

      // Render edges after a frame so nodes have layout
      requestAnimationFrame(() => {
        const cw = canvas.offsetWidth;
        const ch = canvasH;
        edgeLayer.setAttribute('viewBox', '0 0 ' + cw + ' ' + ch);

        wf.edges.forEach(e => {
          const fromNode = nodesLayer.querySelector(`[data-node-id="${e.from}"]`);
          const toNode = nodesLayer.querySelector(`[data-node-id="${e.to}"]`);
          if (!fromNode || !toNode) return;

          const fromRect = fromNode.getBoundingClientRect();
          const toRect = toNode.getBoundingClientRect();
          const canvasRect = canvas.getBoundingClientRect();

          const x1 = fromRect.left - canvasRect.left + fromRect.width / 2;
          const y1 = fromRect.top - canvasRect.top + fromRect.height;
          const x2 = toRect.left - canvasRect.left + toRect.width / 2;
          const y2 = toRect.top - canvasRect.top;

          const midY = (y1 + y2) / 2;
          const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;

          // Background path
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          path.setAttribute('class', 'edge-path');
          path.dataset.step = e.step;
          path.dataset.from = e.from;
          path.dataset.to = e.to;
          edgeLayer.appendChild(path);

          // Animated flow path
          const flow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          flow.setAttribute('d', d);
          flow.setAttribute('class', 'edge-flow');
          flow.dataset.step = e.step;
          edgeLayer.appendChild(flow);

          // Data token
          const token = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          token.setAttribute('class', 'data-token');
          token.setAttribute('r', '4');
          token.dataset.step = e.step;
          token.dataset.pathD = d;
          edgeLayer.appendChild(token);
        });

        // Set max step
        maxStep = Math.max(...wf.nodes.map(n => n.step));
        updateStepDisplay();
      });
    }

    // ═══════════════════════════════════════════════
    //  ANIMATION STATE
    // ═══════════════════════════════════════════════
    function updateStepDisplay() {
      stepLabel.textContent = currentStep + ' / ' + maxStep;
      const pct = maxStep > 0 ? (currentStep / maxStep) * 100 : 0;
      progressFill.style.width = pct + '%';
      progressTrack.setAttribute('aria-valuenow', Math.round(pct));

      // Update nodes
      nodesLayer.querySelectorAll('.wf-node').forEach(node => {
        const s = parseInt(node.dataset.step);
        node.classList.remove('active', 'completed', 'future');
        if (s < currentStep) node.classList.add('completed');
        else if (s === currentStep) node.classList.add('active');
        else node.classList.add('future');
      });

      // Update edges
      edgeLayer.querySelectorAll('.edge-path').forEach(path => {
        const s = parseInt(path.dataset.step);
        path.classList.remove('active', 'completed');
        if (s < currentStep) path.classList.add('completed');
        else if (s === currentStep) path.classList.add('active');
      });

      edgeLayer.querySelectorAll('.edge-flow').forEach(flow => {
        const s = parseInt(flow.dataset.step);
        flow.classList.remove('active');
        if (s === currentStep) flow.classList.add('active');
      });

      // Animate data tokens
      animateTokens();
    }

    function animateTokens() {
      edgeLayer.querySelectorAll('.data-token').forEach(token => {
        const s = parseInt(token.dataset.step);
        token.classList.remove('active');
        if (s !== currentStep) return;

        token.classList.add('active');
        const d = token.dataset.pathD;
        if (!d) return;

        // Create temp path for getPointAtLength
        const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        tempPath.setAttribute('d', d);
        edgeLayer.appendChild(tempPath);
        const totalLen = tempPath.getTotalLength();
        edgeLayer.removeChild(tempPath);

        // Animate token along the path
        const duration = 800 / playSpeed;
        const start = performance.now();

        function step(now) {
          if (!token.classList.contains('active')) return;
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const point = getPointOnPath(d, progress, totalLen);
          token.setAttribute('cx', point.x);
          token.setAttribute('cy', point.y);
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    }

    function getPointOnPath(d, t, totalLen) {
      const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      tempPath.setAttribute('d', d);
      edgeLayer.appendChild(tempPath);
      const len = totalLen || tempPath.getTotalLength();
      const point = tempPath.getPointAtLength(t * len);
      edgeLayer.removeChild(tempPath);
      return point;
    }

    // ═══════════════════════════════════════════════
    //  PLAYBACK CONTROLS
    // ═══════════════════════════════════════════════
    function stepForward() {
      if (currentStep < maxStep) {
        currentStep++;
        updateStepDisplay();
      } else {
        stopPlayback();
      }
    }

    function stepBack() {
      if (currentStep > 0) {
        currentStep--;
        updateStepDisplay();
      }
    }

    function togglePlay() {
      if (isPlaying) {
        stopPlayback();
      } else {
        startPlayback();
      }
    }

    function startPlayback() {
      if (currentStep >= maxStep) currentStep = 0;
      isPlaying = true;
      updatePlayIcon();
      playInterval = setInterval(() => {
        if (currentStep < maxStep) {
          currentStep++;
          updateStepDisplay();
        } else {
          stopPlayback();
        }
      }, 1500 / playSpeed);
    }

    function stopPlayback() {
      isPlaying = false;
      updatePlayIcon();
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
    }

    function updatePlayIcon() {
      if (isPlaying) {
        playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>';
        btnPlay.setAttribute('aria-label', 'Pause');
      } else {
        playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"></polygon>';
        btnPlay.setAttribute('aria-label', 'Play');
      }
    }

    function cycleSpeed() {
      const idx = SPEEDS.indexOf(playSpeed);
      playSpeed = SPEEDS[(idx + 1) % SPEEDS.length];
      speedBtn.textContent = playSpeed + 'x';
      if (isPlaying) {
        stopPlayback();
        startPlayback();
      }
    }

    // ═══════════════════════════════════════════════
    //  WORKFLOW SWITCHING
    // ═══════════════════════════════════════════════
    function switchWorkflow(key) {
      stopPlayback();
      currentWorkflow = key;
      currentStep = 0;
      renderTemplateTabs();
      renderWorkflow(key);
    }

    // ═══════════════════════════════════════════════
    //  DETAIL PANEL
    // ═══════════════════════════════════════════════
    function openDetail(node, nodeType) {
      detailTitle.textContent = node.label;

      const colorMap = { blue: 'rgba(74,103,133,0.15)', orange: 'rgba(232,132,90,0.15)', green: 'rgba(124,185,126,0.15)', yellow: 'rgba(212,168,87,0.15)', light: 'rgba(139,167,189,0.1)' };
      const textColorMap = { blue: 'var(--accent-300)', orange: 'var(--panda-300)', green: 'var(--success)', yellow: 'var(--warning)', light: 'var(--accent-200)' };

      detailBody.innerHTML = `
        <div class="detail-node-type" style="background: ${colorMap[nodeType.color]}; color: ${textColorMap[nodeType.color]};">
          ${getIconSVG(nodeType.icon)} ${nodeType.label}
        </div>

        <div class="detail-section">
          <h4>What it does</h4>
          <p>${nodeType.description}</p>
        </div>

        <div class="detail-section">
          <h4>Real-world example</h4>
          <div class="detail-example">${nodeType.realWorld}</div>
        </div>

        <div class="detail-section">
          <h4>Key insight</h4>
          <p>${nodeType.keyIdea}</p>
        </div>
      `;

      detailPanel.classList.add('open');
      detailOverlay.classList.add('open');
    }

    function closeDetail() {
      detailPanel.classList.remove('open');
      detailOverlay.classList.remove('open');
    }

    // ═══════════════════════════════════════════════
    //  CONCEPTS GRID
    // ═══════════════════════════════════════════════
    function renderConcepts() {
      conceptsGrid.innerHTML = '';
      CONCEPTS.forEach(c => {
        const card = document.createElement('div');
        card.className = 'concept-card';
        card.innerHTML = `
          <div class="concept-icon">${getIconSVG(c.icon)}</div>
          <h4>${c.title}</h4>
          <p>${c.desc}</p>
        `;
        conceptsGrid.appendChild(card);
      });
    }

    // ═══════════════════════════════════════════════
    //  PROGRESS BAR CLICK
    // ═══════════════════════════════════════════════
    progressTrack.addEventListener('click', (e) => {
      const rect = progressTrack.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      currentStep = Math.round(pct * maxStep);
      if (currentStep < 0) currentStep = 0;
      if (currentStep > maxStep) currentStep = maxStep;
      updateStepDisplay();
    });

    // ═══════════════════════════════════════════════
    //  EVENT LISTENERS
    // ═══════════════════════════════════════════════
    btnPlay.addEventListener('click', togglePlay);
    btnStepFwd.addEventListener('click', stepForward);
    btnStepBack.addEventListener('click', stepBack);
    speedBtn.addEventListener('click', cycleSpeed);
    detailClose.addEventListener('click', closeDetail);
    detailOverlay.addEventListener('click', closeDetail);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Don't intercept if user is typing in an input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === ' ' && !e.target.closest('.wf-node')) {
        e.preventDefault();
        togglePlay();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        stepForward();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        stepBack();
      } else if (e.key === 'Escape') {
        closeDetail();
      }
    });

    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderWorkflow(currentWorkflow);
        updateStepDisplay();
      }, 200);
    });

    // ═══════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════
    renderTemplateTabs();
    renderConcepts();

    // Wait for feather icons to load, then render
    function initWorkflow() {
      renderWorkflow(currentWorkflow);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => setTimeout(initWorkflow, 100));
    } else {
      setTimeout(initWorkflow, 100);
    }
  </script>
</body>

</html>
