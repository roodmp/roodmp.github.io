<!DOCTYPE html>
<!-- Page: Brick Breaker — canvas-based breakout/brick-breaker game -->
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick Breaker - Mark Rood</title>
    <link rel="icon" type="image/x-icon" href="../favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../design-system.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-primary);
        }

        /* Floating nav */
        .game-header {
            position: fixed;
            top: var(--space-4);
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 var(--space-4);
            pointer-events: none;
        }

        @media (min-width: 640px) {
            .game-header {
                top: var(--space-6);
            }
        }

        .game-nav {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            max-width: fit-content;
            margin: 0 auto;
            padding: var(--space-2) var(--space-4);
            background: rgba(34, 34, 31, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-lg);
            pointer-events: auto;
        }

        .game-nav .nav-logo {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            text-decoration: none;
            color: var(--text-primary);
        }

        .game-nav .nav-logo img {
            height: 28px;
            width: auto;
            border-radius: var(--radius-md);
        }

        .game-nav .nav-links {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .game-nav .nav-link {
            position: relative;
            padding: var(--space-2) var(--space-4);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: var(--text-sm);
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .game-nav .nav-link:hover {
            color: var(--text-primary);
            background-color: var(--bg-hover);
        }

        /* On mobile the floating header gives way to the site's bottom tab bar
           (.bottom-tab-bar styles come from design-system.css at the same breakpoint) */
        @media (max-width: 640px) {
            .game-header {
                display: none;
            }
        }

        /* Canvas container */
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 100px 16px 8px;
            gap: 0px;
        }

        @media (max-width: 640px) {
            .canvas-container {
                /* Header is hidden; bottom padding clears the fixed tab bar */
                padding: 12px 8px calc(52px + var(--space-4) + var(--space-2) + env(safe-area-inset-bottom, 0px));
            }
        }

        /* HUD top bar */
        .game-hud-top {
            width: 100%;
            max-width: 800px;
            font-family: var(--font-mono);
            padding: 0 4px 4px;
        }

        .hud-main-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        /* Active timed-powerup badges. Reserves height even when empty so
           the canvas's computed max-height (resize(), based on
           hudTop.offsetHeight) doesn't jump mid-game as badges appear. */
        .hud-powerups {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 26px;
            padding-top: 4px;
        }

        .powerup-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px 3px 5px;
            border-radius: var(--radius-full);
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .powerup-badge-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .powerup-badge--warning {
            animation: powerup-pulse 0.4s ease-in-out infinite alternate;
        }

        @keyframes powerup-pulse {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        .hud-left, .hud-center, .hud-right {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        /* Vertically center the pause button against the hearts, rather
           than baseline-aligning it like the surrounding text. */
        .hud-right {
            align-items: center;
        }

        .hud-center {
            align-items: center;
            gap: 0;
        }

        .hud-score {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .hud-level {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .hud-lives {
            color: #E8845A;
            font-size: 14px;
            letter-spacing: 2px;
        }


        canvas {
            display: block;
            border-radius: var(--radius-lg);
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
            border: 1px solid rgba(74, 103, 133, 0.2);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 0, 0, 0.2);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 24, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .overlay-content {
            text-align: center;
            max-width: 400px;
            padding: var(--space-8);
        }

        .overlay-title {
            font-family: var(--font-sans);
            font-size: var(--text-4xl);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            margin-bottom: var(--space-4);
        }

        .overlay-subtitle {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            color: var(--text-secondary);
            margin-bottom: var(--space-6);
            line-height: 1.6;
        }

        .overlay-score {
            font-family: var(--font-mono);
            font-size: var(--text-2xl);
            color: var(--accent-300);
            margin-bottom: var(--space-2);
        }

        .overlay-high-score {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            margin-bottom: var(--space-6);
        }

        .overlay-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-3) var(--space-8);
            font-family: var(--font-sans);
            font-size: var(--text-base);
            font-weight: 600;
            color: white;
            background: var(--accent-500);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .overlay-btn:hover {
            background: var(--accent-600);
            box-shadow: var(--shadow-accent);
        }

        .overlay-hint {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            margin-top: var(--space-4);
        }

        .overlay-controls {
            margin-top: var(--space-6);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        .overlay-controls kbd {
            display: inline-block;
            padding: 2px 8px;
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            background: var(--bg-elevated);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
        }

        /* Control hint variants: desktop (keyboard) vs touch (drag/tap) */
        .touch-only {
            display: none;
        }

        @media (hover: none), (pointer: coarse) {
            .desktop-only {
                display: none;
            }
            .touch-only {
                display: block;
            }
        }

        /* Small pause button in the HUD, touch/coarse-pointer devices only -
           desktop already has Space for launch/pause. */
        .pause-btn {
            display: none;
            width: 28px;
            height: 28px;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            background: var(--bg-elevated);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-full);
            touch-action: manipulation;
            cursor: pointer;
        }

        .pause-btn:active {
            background: var(--bg-hover);
        }

        .pause-btn svg {
            width: 14px;
            height: 14px;
        }

        @media (hover: none), (pointer: coarse) {
            .pause-btn {
                display: flex;
            }
        }
    </style>
    <script src="../main.js" defer></script>
</head>
