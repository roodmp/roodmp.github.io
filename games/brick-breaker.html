    <script>
    (function () {
        'use strict';

        // --- Canvas setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // HUD DOM elements
        const hudTop = document.getElementById('hudTop');
        const hudScore = document.getElementById('hudScore');
        const hudLevel = document.getElementById('hudLevel');
        const hudLives = document.getElementById('hudLives');
        const hudPowerups = document.getElementById('hudPowerups');

        const BASE_W = 800;
        const BASE_H = 600;
        let scale = 1;

        function resize() {
            const container = canvas.parentElement;
            const style = getComputedStyle(container);
            const padTop = parseFloat(style.paddingTop);
            const padBot = parseFloat(style.paddingBottom);
            const maxW = container.clientWidth - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight);
            const hudH = hudTop.offsetHeight + 4;
            const maxH = container.clientHeight - padTop - padBot - hudH;
            const ratio = Math.min(maxW / BASE_W, maxH / BASE_H, 1.5);
            scale = ratio;
            canvas.width = Math.floor(BASE_W * ratio);
            canvas.height = Math.floor(BASE_H * ratio);
            hudTop.style.width = canvas.width + 'px';
        }

        window.addEventListener('resize', resize);
        resize();

        // --- Design tokens ---
        const COLORS = {
            bg: '#1A1A18',
            paddle: '#4A6785',
            paddleGlow: 'rgba(74, 103, 133, 0.4)',
            ball: '#F5F5F4',
            ballTrail: 'rgba(245, 245, 244, 0.15)',
            brickSingle: '#6B8CAE',
            brickDouble: '#E8845A',
            brickTriple: '#D4693D',
            brickDamaged: '#4A6785',
            textPrimary: '#F5F5F4',
            textSecondary: '#A8A8A4',
            textTertiary: '#6B6B67',
            uiBg: 'rgba(34, 34, 31, 0.7)',
            border: 'rgba(255, 255, 255, 0.08)',
        };

        // --- Powerup definitions ---
        const POWERUP_TYPES = {
            slow:      { color: '#5B8CB8' },
            wide:      { color: '#5BB87A' },
            extraBall: { color: '#E8845A' },
            extraLife: { color: '#B85B5B' },
            fireball:  { color: '#FF6B35' },
            laser:     { color: '#C084FC' },
            blast:     { color: '#FFA500' },
            shield:    { color: '#00CED1' },

            missile:   { color: '#FFD700' },
        };

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- Game state ---
        let gameState = 'start'; // start | playing | paused | levelComplete | gameOver
        let score = 0;
        let lives = 3;
        let level = 1;
        let highScoreVal = parseInt(localStorage.getItem('brick_breaker_high_score')) || 0;
        let frameCount = 0;
        // Real-time accumulators driving the fireball/blast particle cadence
        // below (used instead of "frameCount % N === 0", since frameCount is
        // now a fractional real-time counter and would rarely land on an
        // exact multiple of N).
        let fireballEmberAccum = 0;
        let blastCrackleAccum = 0;

        // Paddle
        const paddle = {
            baseWidth: 100,
            height: 14,
            x: 0,
            y: 0,
            speed: 8,
        };

        function getPaddleWidth() {
            const multipliers = [1.0, 1.5, 1.8, 2.0];
            const wide = paddlePowerups.wide;
            return paddle.baseWidth * multipliers[wide ? wide.level : 0];
        }

        // Shield sits below the paddle so it only saves a ball the paddle
        // actually missed, instead of intercepting every ball before the
        // paddle gets a chance to.
        function getShieldY() {
            return paddle.y + paddle.height + 10;
        }

        function getBallSpeedMultiplier() {
            const slow = ballPowerups.slow;
            if (!slow) return 1.0;
            return [1.0, 0.6, 0.4, 0.25][slow.level];
        }

        // Balls array
        let balls = [];
        let baseBallSpeed = 3.75;

        function createBall(x, y, dx, dy) {
            return {
                x: x,
                y: y,
                dx: dx,
                dy: dy,
                radius: 7,
                type: 'normal',
                attached: false,
                trail: [],
            };
        }

        // Powerup state: powerups stack — each type gets its own independent
        // slot (keyed by type) so e.g. laser + missile + shield + wide, or
        // slow + fireball + blast, can all be active at the same time.
        // Each slot is `{ level, timer }`; `timer` counts down (in timeScale
        // units, ~60/sec) for powerups in TIMED_TYPES and is unused (stays 0)
        // for persist-until-life-lost ones like `wide`.
        let ballPowerups = {};
        let paddlePowerups = {};
        let fallingCapsule = null;

        // "Strong" powerups expire on a clock instead of persisting until the
        // player loses a ball. Duration is flat regardless of level; leveling
        // up (recatching the same type) increases potency, not time.
        const TIMED_POWERUP_DURATION = 720; // ~12s at the 60fps-equivalent reference rate
        const TIMED_TYPES = new Set(['slow', 'fireball', 'blast', 'laser', 'missile', 'shield']);

        // Particle system
        let particles = [];
        const MAX_PARTICLES = 200;

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                if (particles.length >= MAX_PARTICLES) break;
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x: x,
                    y: y,
                    dx: Math.cos(angle) * speed,
                    dy: Math.sin(angle) * speed,
                    life: 20 + Math.random() * 15,
                    maxLife: 0,
                    color: color,
                    size: 2 + Math.random() * 2,
                });
                particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
            }
        }

        // Lasers
        let lasers = [];
        let laserCooldown = 0;

        // Shield
        let shieldState = { active: false, broken: false, regenTimer: 0, hitFlashTimer: 0 };

        // Missiles
        let missiles = [];
        let missileCooldown = 0;

        // Blast chain reaction queue
        let blastQueue = [];

        function clearPowerupState() {
            ballPowerups = {};
            paddlePowerups = {};
            fallingCapsule = null;
            lasers = [];
            laserCooldown = 0;
            shieldState = { active: false, broken: false, regenTimer: 0, hitFlashTimer: 0 };
            missiles = [];
            missileCooldown = 0;
            blastQueue = [];
        }

        // Bricks
        let bricks = [];
        const BRICK_ROWS_MAX = 8;
        const BRICK_COLS = 13;
        const BRICK_PAD = 3;
        const BRICK_TOP_OFFSET = 12;

        // Input
        const keys = {};

        // --- Level definitions ---
        const levels = [
            () => generateBricks(4, BRICK_COLS, () => 1),
            () => generateBricks(5, BRICK_COLS, (r) => r < 2 ? 2 : 1),
            () => generateBricks(6, BRICK_COLS, (r) => r === 0 ? 3 : r < 3 ? 2 : 1),
            () => generateBricks(6, BRICK_COLS, (r, c) => {
                if ((r + c) % 2 === 0) return r < 2 ? 3 : 2;
                return 1;
            }),
            () => generateBricks(7, BRICK_COLS, (r) => {
                if (r < 2) return 3;
                if (r < 4) return 2;
                return 1;
            }),
        ];

        function generateBricks(rows, cols, hitsFn) {
            const brickList = [];
            const brickW = (BASE_W - BRICK_PAD * (cols + 1)) / cols;
            const brickH = 16;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const maxHits = hitsFn(r, c);
                    brickList.push({
                        x: BRICK_PAD + c * (brickW + BRICK_PAD),
                        y: BRICK_TOP_OFFSET + r * (brickH + BRICK_PAD),
                        width: brickW,
                        height: brickH,
                        hits: maxHits,
                        maxHits: maxHits,
                        alive: true,
                    });
                }
            }
            return brickList;
        }

        function getLevelBricks(lvl) {
            const idx = Math.min(lvl - 1, levels.length - 1);
            return levels[idx]();
        }

        // --- Init / reset ---
        function initLevel(carryoverBallCount) {
            bricks = getLevelBricks(level);
            const count = carryoverBallCount || 1;
            resetBallToPaddle(count);
        }

        function resetBallToPaddle(count) {
            count = count || 1;
            const pw = getPaddleWidth();
            paddle.x = (BASE_W - pw) / 2;
            paddle.y = BASE_H - 30;
            balls = [];
            for (let i = 0; i < count; i++) {
                const b = createBall(0, 0, 0, 0);
                b.attached = true;
                b.trail = [];
                balls.push(b);
            }
            positionAttachedBalls();
        }

        function positionBallOnPaddle(b) {
            const pw = getPaddleWidth();
            b.x = paddle.x + pw / 2;
            b.y = paddle.y - b.radius - 1;
        }

        function positionAttachedBalls() {
            const pw = getPaddleWidth();
            let stackIndex = 0;
            for (const b of balls) {
                if (!b.attached) continue;
                b.x = paddle.x + pw / 2;
                b.y = paddle.y - b.radius - 1 - stackIndex * (b.radius * 2 + 2);
                stackIndex++;
            }
        }

        function launchBall() {
            const b = balls.find(b => b.attached);
            if (!b) return;
            b.attached = false;
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
            const spd = baseBallSpeed * getBallSpeedMultiplier();
            b.dx = Math.cos(angle) * spd;
            b.dy = Math.sin(angle) * spd;
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            baseBallSpeed = 3.75;
            frameCount = 0;
            clearPowerupState();
            initLevel();
            gameState = 'playing';
            showOverlay(null);
        }

        function nextLevel() {
            const carryoverBallCount = Math.max(1, balls.length);
            level++;
            baseBallSpeed = 3.75 + Math.floor(level / 2) * 0.375;
            // Powerups carry over — only clear projectiles and in-flight capsule
            fallingCapsule = null;
            lasers = [];
            missiles = [];
            blastQueue = [];
            initLevel(carryoverBallCount);
            gameState = 'playing';
            showOverlay(null);
        }

        // --- Powerup spawning ---
        function trySpawnCapsule(brick) {
            if (fallingCapsule) return;
            if (Math.random() > 0.20) return;

            let type;
            const roll = Math.random();
            if (roll < 0.03) {
                type = 'extraLife';
            } else {
                const remaining = ['slow', 'wide', 'extraBall', 'fireball', 'laser', 'blast', 'shield', 'missile'];
                type = remaining[Math.floor(Math.random() * remaining.length)];
            }

            fallingCapsule = {
                x: brick.x + brick.width / 2,
                y: brick.y + brick.height / 2,
                type: type,
                speed: 2,
            };
        }

        function applyPowerup(type) {
            if (type === 'extraLife') {
                lives = Math.min(lives + 1, 5);
            } else if (type === 'extraBall') {
                const pw = getPaddleWidth();
                const newBall = createBall(
                    paddle.x + pw / 2,
                    paddle.y - 8,
                    0, 0
                );
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
                const spd = baseBallSpeed;
                newBall.dx = Math.cos(angle) * spd;
                newBall.dy = Math.sin(angle) * spd;
                balls.push(newBall);
            } else if (type === 'wide' || type === 'laser' || type === 'missile' || type === 'shield') {
                if (paddlePowerups[type]) {
                    paddlePowerups[type].level = Math.min(paddlePowerups[type].level + 1, 3);
                } else {
                    paddlePowerups[type] = { level: 1, timer: 0 };
                }
                if (TIMED_TYPES.has(type)) paddlePowerups[type].timer = TIMED_POWERUP_DURATION;
                if (type === 'laser') laserCooldown = 0;
                if (type === 'missile') missileCooldown = 0;
                if (type === 'shield') {
                    shieldState.active = true;
                    shieldState.broken = false;
                    shieldState.regenTimer = 0;
                    shieldState.hitFlashTimer = 0;
                }
            } else if (type === 'slow' || type === 'fireball' || type === 'blast') {
                if (ballPowerups[type]) {
                    ballPowerups[type].level = Math.min(ballPowerups[type].level + 1, 3);
                } else {
                    ballPowerups[type] = { level: 1, timer: 0 };
                }
                ballPowerups[type].timer = TIMED_POWERUP_DURATION;
            }
        }

        // --- Overlays ---
        const overlays = {
            start: document.getElementById('startOverlay'),
            paused: document.getElementById('pauseOverlay'),
            levelComplete: document.getElementById('levelOverlay'),
            gameOver: document.getElementById('gameOverOverlay'),
        };

        function showOverlay(name) {
            Object.values(overlays).forEach(o => o.classList.remove('visible'));
            if (name && overlays[name]) {
                overlays[name].classList.add('visible');
            }
        }

        // Overlay buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('resumeBtn').addEventListener('click', () => {
            gameState = 'playing';
            showOverlay(null);
        });
        document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // --- Input handling ---
        // Shared by the Space key and the touch pause button.
        function togglePauseOrAdvance() {
            if (gameState === 'start' || gameState === 'gameOver') {
                startGame();
            } else if (gameState === 'levelComplete') {
                nextLevel();
            } else if (gameState === 'playing' && balls.some(b => b.attached)) {
                launchBall();
            } else if (gameState === 'playing') {
                gameState = 'paused';
                showOverlay('paused');
            } else if (gameState === 'paused') {
                gameState = 'playing';
                showOverlay(null);
            }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                togglePauseOrAdvance();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // --- Touch controls ---
        // Drag anywhere on the canvas to follow the paddle to that x
        // position (the standard mobile paddle-game control - precise
        // positioning matters more than it would for a directional-button
        // scheme). The launch angle is randomized regardless of paddle
        // position (see launchBall()), so there's no benefit to lining up
        // before launching: touching the canvas while a ball is attached
        // launches it immediately, same gesture that starts the drag.
        function touchXToPaddleTarget(clientX) {
            const rect = canvas.getBoundingClientRect();
            const baseX = (clientX - rect.left) / scale;
            const pw = getPaddleWidth();
            return Math.max(0, Math.min(BASE_W - pw, baseX - pw / 2));
        }

        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const touch = e.touches[0];
            paddle.x = touchXToPaddleTarget(touch.clientX);
            if (balls.some(b => b.attached)) launchBall();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const touch = e.touches[0];
            paddle.x = touchXToPaddleTarget(touch.clientX);
        }, { passive: false });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            // Deliberately not togglePauseOrAdvance(): that function launches
            // the ball if one is still attached, which is right for the
            // overloaded Space key but wrong for a button explicitly
            // labeled "pause" - tapping it should always pause/resume, even
            // in the moment right after starting when a ball is waiting to
            // launch.
            if (gameState === 'playing') {
                gameState = 'paused';
                showOverlay('paused');
            } else if (gameState === 'paused') {
                gameState = 'playing';
                showOverlay(null);
            }
        });

        // --- Update ---
        function updatePaddle(timeScale) {
            const pw = getPaddleWidth();
            if (keys['ArrowLeft']) {
                paddle.x -= paddle.speed * timeScale;
            }
            if (keys['ArrowRight']) {
                paddle.x += paddle.speed * timeScale;
            }
            paddle.x = Math.max(0, Math.min(BASE_W - pw, paddle.x));
            positionAttachedBalls();
        }

        function updateCapsule(timeScale) {
            if (!fallingCapsule) return;

            fallingCapsule.y += fallingCapsule.speed * timeScale;

            // Off screen
            if (fallingCapsule.y > BASE_H + 20) {
                fallingCapsule = null;
                return;
            }

            // Paddle collision (AABB)
            const pw = getPaddleWidth();
            const capW = 40, capH = 20;
            const cx = fallingCapsule.x - capW / 2;
            const cy = fallingCapsule.y - capH / 2;

            if (
                cx + capW > paddle.x &&
                cx < paddle.x + pw &&
                cy + capH > paddle.y &&
                cy < paddle.y + paddle.height
            ) {
                applyPowerup(fallingCapsule.type);
                fallingCapsule = null;
            }
        }

        function updateBalls(timeScale) {
            const pw = getPaddleWidth();

            // These used to gate on "frameCount % 2/3 === 0", but frameCount
            // is now a fractional real-time counter (see loop()) that rarely
            // lands on an exact multiple. Real-time accumulators keep the
            // same shared, once-per-frame cadence, just measured in elapsed
            // time instead of frame count.
            // Tiny epsilon avoids floating-point boundary jitter (e.g.
            // timeScale landing on 1.9999999999999998 instead of exactly 2)
            // silently delaying an emission by a whole extra frame.
            const EPS = 1e-9;
            fireballEmberAccum += timeScale;
            const emitFireballEmbers = fireballEmberAccum >= 2 - EPS;
            if (emitFireballEmbers) fireballEmberAccum -= 2;

            blastCrackleAccum += timeScale;
            const emitBlastCrackle = blastCrackleAccum >= 3 - EPS;
            if (emitBlastCrackle) blastCrackleAccum -= 3;

            for (let bi = balls.length - 1; bi >= 0; bi--) {
                const b = balls[bi];

                if (b.attached) {
                    positionBallOnPaddle(b);
                    continue;
                }

                const speedMult = getBallSpeedMultiplier();

                // Trail
                const maxTrail = 8;
                b.trail.push({ x: b.x, y: b.y });
                if (b.trail.length > maxTrail) b.trail.shift();

                // Fireball ember particles
                if (ballPowerups.fireball && emitFireballEmbers) {
                    const particleCount = Math.min(ballPowerups.fireball.level, 3);
                    createParticles(b.x, b.y, Math.random() > 0.5 ? '#FF6B35' : '#FFD700', particleCount);
                }

                // Blast crackling particles
                if (ballPowerups.blast && emitBlastCrackle) {
                    createParticles(b.x, b.y, Math.random() > 0.5 ? '#FFA500' : '#FF8C00', 1);
                }


                // Keep direction unit vector, apply current effective speed
                const mag = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                if (mag > 0) {
                    const effectiveSpeed = baseBallSpeed * speedMult * timeScale;
                    b.x += (b.dx / mag) * effectiveSpeed;
                    b.y += (b.dy / mag) * effectiveSpeed;
                }

                // Wall collisions
                if (b.x - b.radius <= 0) {
                    b.x = b.radius;
                    b.dx = Math.abs(b.dx);
                }
                if (b.x + b.radius >= BASE_W) {
                    b.x = BASE_W - b.radius;
                    b.dx = -Math.abs(b.dx);
                }
                if (b.y - b.radius <= 0) {
                    b.y = b.radius;
                    b.dy = Math.abs(b.dy);
                }

                // Fell off bottom
                if (b.y + b.radius > BASE_H + 20) {
                    // Reset all paddle powerups when any ball is lost; ball powerups persist
                    paddlePowerups = {};
                    lasers = [];
                    missiles = [];
                    shieldState.active = false;
                    shieldState.broken = false;
                    balls.splice(bi, 1);
                    continue;
                }

                // Shield reflection
                const SHIELD_Y = getShieldY();
                if (shieldState.active && !shieldState.broken && b.dy > 0) {
                    if (b.y + b.radius >= SHIELD_Y && b.y - b.radius <= SHIELD_Y + 4) {
                        b.y = SHIELD_Y - b.radius;
                        b.dy = -Math.abs(b.dy);
                        shieldState.hitFlashTimer = 10;
                        createParticles(b.x, SHIELD_Y, '#00CED1', 6);
                        if (paddlePowerups.shield && paddlePowerups.shield.level < 3) {
                            shieldState.broken = true;
                            shieldState.regenTimer = 0;
                        }
                    }
                }

                // Paddle collision
                if (
                    b.dy > 0 &&
                    b.y + b.radius >= paddle.y &&
                    b.y + b.radius <= paddle.y + paddle.height + 4 &&
                    b.x >= paddle.x &&
                    b.x <= paddle.x + pw
                ) {
                    b.y = paddle.y - b.radius;
                    b.dy = -Math.abs(b.dy);

                    const hitPos = (b.x - paddle.x) / pw;
                    const angle = (hitPos - 0.5) * Math.PI * 0.7;
                    const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                    b.dx = Math.sin(angle) * speed;
                    b.dy = -Math.cos(angle) * speed;

                }

                // Brick collisions
                const fireball = ballPowerups.fireball;
                const blast = ballPowerups.blast;
                for (let i = 0; i < bricks.length; i++) {
                    const br = bricks[i];
                    if (!br.alive) continue;

                    if (ballIntersectsBrick(b, br)) {
                        // Fireball level 3: instant-kill
                        if (fireball && fireball.level >= 3) {
                            br.hits = 0;
                        } else {
                            br.hits--;
                        }
                        if (br.hits <= 0) {
                            br.alive = false;
                            score += br.maxHits * 10;
                            trySpawnCapsule(br);
                            // Particles on destroy — more with fireball, scaled by level
                            const brickColor = br.maxHits >= 3 ? COLORS.brickTriple : br.maxHits === 2 ? COLORS.brickDouble : COLORS.brickSingle;
                            const particleCount = fireball ? 8 + fireball.level * 4 : blast ? 20 + blast.level * 8 : 8;
                            createParticles(br.x + br.width / 2, br.y + br.height / 2, brickColor, particleCount);

                            // Blast AoE
                            if (blast) {
                                const blastRadius = [0, 80, 120, 180][blast.level];
                                const brcx = br.x + br.width / 2;
                                const brcy = br.y + br.height / 2;
                                for (const target of bricks) {
                                    if (!target.alive || target === br) continue;
                                    const tcx = target.x + target.width / 2;
                                    const tcy = target.y + target.height / 2;
                                    const dist = Math.sqrt((brcx - tcx) * (brcx - tcx) + (brcy - tcy) * (brcy - tcy));
                                    if (dist <= blastRadius) {
                                        target.hits--;
                                        if (target.hits <= 0) {
                                            target.alive = false;
                                            score += target.maxHits * 5;
                                            trySpawnCapsule(target);
                                            const tColor = target.maxHits >= 3 ? COLORS.brickTriple : target.maxHits === 2 ? COLORS.brickDouble : COLORS.brickSingle;
                                            createParticles(tcx, tcy, tColor, 6);
                                            // Lv3 chain reaction
                                            if (blast.level >= 3) {
                                                blastQueue.push({ x: tcx, y: tcy, delay: 5, radius: blastRadius * 0.6 });
                                            }
                                        }
                                    }
                                }
                            }
                        } else {
                            score += 5;
                        }

                        if (fireball) {
                            // Fireball: pierce through, don't bounce
                            continue;
                        }

                        const overlapLeft = (b.x + b.radius) - br.x;
                        const overlapRight = (br.x + br.width) - (b.x - b.radius);
                        const overlapTop = (b.y + b.radius) - br.y;
                        const overlapBottom = (br.y + br.height) - (b.y - b.radius);

                        const minOverlapX = Math.min(overlapLeft, overlapRight);
                        const minOverlapY = Math.min(overlapTop, overlapBottom);

                        if (minOverlapX < minOverlapY) {
                            b.dx = -b.dx;
                        } else {
                            b.dy = -b.dy;
                        }

                        break;
                    }
                }
            }

            // All balls lost
            if (balls.length === 0) {
                lives--;
                clearPowerupState();
                if (lives <= 0) {
                    endGame();
                } else {
                    resetBallToPaddle();
                }
                return;
            }

            // Check level complete
            if (bricks.every(br => !br.alive)) {
                gameState = 'levelComplete';
                document.getElementById('levelScore').textContent = `Score: ${score}`;
                showOverlay('levelComplete');
            }
        }

        function ballIntersectsBrick(b, brick) {
            const closestX = Math.max(brick.x, Math.min(b.x, brick.x + brick.width));
            const closestY = Math.max(brick.y, Math.min(b.y, brick.y + brick.height));
            const dx = b.x - closestX;
            const dy = b.y - closestY;
            return (dx * dx + dy * dy) < (b.radius * b.radius);
        }

        function updateParticles(timeScale) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.dx * timeScale;
                p.y += p.dy * timeScale;
                p.dy += 0.05 * timeScale; // slight gravity
                p.life -= timeScale;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function updateLasers(timeScale) {
            const pw = getPaddleWidth();

            // Fire new laser if active
            const laser = paddlePowerups.laser;
            if (laser) {
                laserCooldown -= timeScale;
                const fireRate = [15, 15, 10, 6][laser.level];
                if (laserCooldown <= 0) {
                    if (laser.level >= 3) {
                        // Dual lasers at level 3
                        lasers.push({ x: paddle.x + pw * 0.33, y: paddle.y, speed: -6 });
                        lasers.push({ x: paddle.x + pw * 0.67, y: paddle.y, speed: -6 });
                    } else {
                        lasers.push({ x: paddle.x + pw / 2, y: paddle.y, speed: -6 });
                    }
                    laserCooldown = fireRate;
                }
            }

            // Update existing lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const l = lasers[i];
                l.y += l.speed * timeScale;

                // Off screen
                if (l.y < -20) {
                    lasers.splice(i, 1);
                    continue;
                }

                // Brick collision (point-in-rect)
                let hit = false;
                for (const br of bricks) {
                    if (!br.alive) continue;
                    if (l.x >= br.x && l.x <= br.x + br.width && l.y >= br.y && l.y <= br.y + br.height) {
                        br.hits--;
                        if (br.hits <= 0) {
                            br.alive = false;
                            score += br.maxHits * 10;
                            trySpawnCapsule(br);
                            const brickColor = br.maxHits >= 3 ? COLORS.brickTriple : br.maxHits === 2 ? COLORS.brickDouble : COLORS.brickSingle;
                            createParticles(br.x + br.width / 2, br.y + br.height / 2, brickColor, 8);
                        } else {
                            score += 5;
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) lasers.splice(i, 1);
            }

            // Check level complete (lasers can finish a level)
            if (bricks.every(br => !br.alive)) {
                gameState = 'levelComplete';
                document.getElementById('levelScore').textContent = `Score: ${score}`;
                showOverlay('levelComplete');
            }
        }

        function updateShield(timeScale) {
            if (shieldState.hitFlashTimer > 0) shieldState.hitFlashTimer -= timeScale;
            if (paddlePowerups.shield && paddlePowerups.shield.level >= 2 && shieldState.broken) {
                shieldState.regenTimer += timeScale;
                if (shieldState.regenTimer >= 300) {
                    shieldState.broken = false;
                    shieldState.active = true;
                    shieldState.regenTimer = 0;
                    createParticles(BASE_W / 2, getShieldY(), '#00CED1', 12);
                }
            }
        }

        function updatePowerupTimers(timeScale) {
            for (const type of TIMED_TYPES) {
                const ballEntry = ballPowerups[type];
                if (ballEntry) {
                    ballEntry.timer -= timeScale;
                    if (ballEntry.timer <= 0) delete ballPowerups[type];
                }
                const paddleEntry = paddlePowerups[type];
                if (paddleEntry) {
                    paddleEntry.timer -= timeScale;
                    if (paddleEntry.timer <= 0) {
                        if (type === 'shield') {
                            shieldState.active = false;
                            shieldState.broken = false;
                        }
                        delete paddlePowerups[type];
                    }
                }
            }
        }

        function updateMissiles(timeScale) {
            const pw = getPaddleWidth();

            // Fire new missiles if active
            const missile = paddlePowerups.missile;
            if (missile) {
                missileCooldown -= timeScale;
                const fireRate = [20, 20, 12, 8][missile.level];
                if (missileCooldown <= 0) {
                    if (missile.level >= 3) {
                        missiles.push({ x: paddle.x + pw * 0.33, y: paddle.y, dx: 0, dy: -3, speed: 3 });
                        missiles.push({ x: paddle.x + pw * 0.67, y: paddle.y, dx: 0, dy: -3, speed: 3 });
                    } else {
                        missiles.push({ x: paddle.x + pw / 2, y: paddle.y, dx: 0, dy: -3, speed: 3 });
                    }
                    missileCooldown = fireRate;
                }
            }

            // Update existing missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];

                // Homing: find nearest alive brick
                let nearestBrick = null;
                let nearestDist = Infinity;
                for (const br of bricks) {
                    if (!br.alive) continue;
                    const bcx = br.x + br.width / 2;
                    const bcy = br.y + br.height / 2;
                    const dist = Math.sqrt((m.x - bcx) * (m.x - bcx) + (m.y - bcy) * (m.y - bcy));
                    if (dist < nearestDist) {
                        nearestDist = dist;
                        nearestBrick = br;
                    }
                }

                if (nearestBrick && nearestDist > 0) {
                    const bcx = nearestBrick.x + nearestBrick.width / 2;
                    const bcy = nearestBrick.y + nearestBrick.height / 2;
                    const targetDx = (bcx - m.x) / nearestDist;
                    const targetDy = (bcy - m.y) / nearestDist;
                    // Homing turn rate: 0.15 was a fixed per-frame blend
                    // factor, scaled here so missiles turn at the same real
                    // rate regardless of frame rate.
                    const turnFactor = Math.min(1, 0.15 * timeScale);
                    m.dx = m.dx * (1 - turnFactor) + targetDx * turnFactor;
                    m.dy = m.dy * (1 - turnFactor) + targetDy * turnFactor;
                    const mag = Math.sqrt(m.dx * m.dx + m.dy * m.dy);
                    if (mag > 0) {
                        m.dx = (m.dx / mag) * m.speed;
                        m.dy = (m.dy / mag) * m.speed;
                    }
                }

                m.x += m.dx * timeScale;
                m.y += m.dy * timeScale;

                // Off screen
                if (m.y < -20 || m.x < -20 || m.x > BASE_W + 20) {
                    missiles.splice(i, 1);
                    continue;
                }

                // Brick collision
                let hit = false;
                for (const br of bricks) {
                    if (!br.alive) continue;
                    if (m.x >= br.x && m.x <= br.x + br.width && m.y >= br.y && m.y <= br.y + br.height) {
                        br.hits--;
                        if (br.hits <= 0) {
                            br.alive = false;
                            score += br.maxHits * 10;
                            trySpawnCapsule(br);
                            const brickColor = br.maxHits >= 3 ? COLORS.brickTriple : br.maxHits === 2 ? COLORS.brickDouble : COLORS.brickSingle;
                            createParticles(br.x + br.width / 2, br.y + br.height / 2, brickColor, 8);
                        } else {
                            score += 5;
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) {
                    missiles.splice(i, 1);
                    continue;
                }
            }

            // Check level complete (missiles can finish a level)
            if (bricks.every(br => !br.alive)) {
                gameState = 'levelComplete';
                document.getElementById('levelScore').textContent = `Score: ${score}`;
                showOverlay('levelComplete');
            }
        }

        function updateBlastQueue(timeScale) {
            for (let i = blastQueue.length - 1; i >= 0; i--) {
                const entry = blastQueue[i];
                entry.delay -= timeScale;
                if (entry.delay <= 0) {
                    for (const target of bricks) {
                        if (!target.alive) continue;
                        const tcx = target.x + target.width / 2;
                        const tcy = target.y + target.height / 2;
                        const dist = Math.sqrt((entry.x - tcx) * (entry.x - tcx) + (entry.y - tcy) * (entry.y - tcy));
                        if (dist <= entry.radius) {
                            target.hits--;
                            if (target.hits <= 0) {
                                target.alive = false;
                                score += target.maxHits * 5;
                                trySpawnCapsule(target);
                                const tColor = target.maxHits >= 3 ? COLORS.brickTriple : target.maxHits === 2 ? COLORS.brickDouble : COLORS.brickSingle;
                                createParticles(tcx, tcy, tColor, 6);
                            }
                        }
                    }
                    createParticles(entry.x, entry.y, '#FFA500', 12);
                    blastQueue.splice(i, 1);
                }
            }
        }

        function endGame() {
            gameState = 'gameOver';
            clearPowerupState();
            if (score > highScoreVal) {
                highScoreVal = score;
                localStorage.setItem('brick_breaker_high_score', highScoreVal);
            }
            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('highScore').textContent = `High Score: ${highScoreVal}`;
            showOverlay('gameOver');
        }

        // --- HUD DOM updates ---
        function updateHUD() {
            hudScore.textContent = score;
            hudLevel.textContent = 'Level ' + level;

            // Lives
            hudLives.textContent = '❤ '.repeat(lives).trim();

            renderPowerupBadges();
        }

        // Timed-powerup countdown badges shown in the HUD, since offensive
        // powerups (laser/missile/fireball/blast/slow/shield) now expire on a
        // clock (TIMED_TYPES) instead of only clearing on ball loss like the
        // paddle-width/multiball ones do. Powerups stack — several can be
        // active at once — so badges are sorted soonest-to-expire first, and
        // the pulse warning in the last 3s highlights whichever is about to
        // run out regardless of how many others are active alongside it.
        const POWERUP_WARNING_THRESHOLD = 180; // ~3s
        // Renders each powerup's existing canvas icon (see POWERUP_ICON_DRAWERS,
        // used for the falling capsules) to a small offscreen canvas once per
        // type and caches the data URL, so the HUD badges can show the same
        // icon instead of a text label without redrawing every frame.
        const POWERUP_ICON_CACHE = {};
        function getPowerupIconDataUrl(type) {
            if (POWERUP_ICON_CACHE[type]) return POWERUP_ICON_CACHE[type];
            const size = 32;
            const iconCanvas = document.createElement('canvas');
            iconCanvas.width = size;
            iconCanvas.height = size;
            POWERUP_ICON_DRAWERS[type](iconCanvas.getContext('2d'), size / 2, size / 2, POWERUP_TYPES[type].color);
            const url = iconCanvas.toDataURL();
            POWERUP_ICON_CACHE[type] = url;
            return url;
        }

        let lastPowerupBadgeCount = 0;
        function renderPowerupBadges() {
            const active = [
                ...Object.entries(ballPowerups),
                ...Object.entries(paddlePowerups),
            ]
                .filter(([type]) => TIMED_TYPES.has(type))
                .map(([type, state]) => ({ type, timer: state.timer }))
                .sort((a, b) => a.timer - b.timer);

            hudPowerups.innerHTML = active.map(p => {
                const color = POWERUP_TYPES[p.type].color;
                const secondsLeft = Math.max(1, Math.ceil(p.timer / 60));
                const warningClass = p.timer <= POWERUP_WARNING_THRESHOLD ? ' powerup-badge--warning' : '';
                const style = `background:${hexToRgba(color, 0.15)};border:1px solid ${hexToRgba(color, 0.45)}`;
                return `<span class="powerup-badge${warningClass}" style="${style}">` +
                    `<img class="powerup-badge-icon" src="${getPowerupIconDataUrl(p.type)}" alt="" />` +
                    `${secondsLeft}s</span>`;
            }).join('');

            // With enough stacked powerups the badge row can wrap onto a
            // second line, changing hudTop's height — re-run resize() (cheap,
            // only on count change, not every frame) so the canvas's
            // computed max-height stays in sync instead of only updating on
            // the next window resize.
            if (active.length !== lastPowerupBadgeCount) {
                lastPowerupBadgeCount = active.length;
                resize();
            }
        }

        // --- Draw ---
        function draw() {
            ctx.save();
            ctx.scale(scale, scale);

            // Background
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, BASE_W, BASE_H);

            // Subtle grid
            ctx.strokeStyle = 'rgba(74, 103, 133, 0.04)';
            ctx.lineWidth = 1;
            for (let x = 0; x < BASE_W; x += 48) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, BASE_H);
                ctx.stroke();
            }
            for (let y = 0; y < BASE_H; y += 48) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(BASE_W, y);
                ctx.stroke();
            }

            // Play area border
            ctx.strokeStyle = 'rgba(74, 103, 133, 0.25)';
            ctx.lineWidth = 2;
            roundRect(ctx, 1, 1, BASE_W - 2, BASE_H - 2, 6);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(74, 103, 133, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, BASE_H);
            ctx.lineTo(0, 6);
            ctx.quadraticCurveTo(0, 0, 6, 0);
            ctx.lineTo(BASE_W - 6, 0);
            ctx.quadraticCurveTo(BASE_W, 0, BASE_W, 6);
            ctx.lineTo(BASE_W, BASE_H);
            ctx.stroke();

            drawBricks();
            drawParticles();
            drawPaddle();
            drawShield();
            drawLasers();
            drawMissiles();
            drawBalls();
            drawCapsule();

            ctx.restore();
        }

        function drawBricks() {
            for (const b of bricks) {
                if (!b.alive) continue;

                let color;
                if (b.maxHits === 1) {
                    color = COLORS.brickSingle;
                } else if (b.hits === b.maxHits) {
                    color = b.maxHits >= 3 ? COLORS.brickTriple : COLORS.brickDouble;
                } else if (b.hits === 1) {
                    color = COLORS.brickDamaged;
                } else {
                    color = COLORS.brickDouble;
                }

                const opacity = 0.5 + (b.hits / b.maxHits) * 0.5;
                ctx.globalAlpha = opacity;
                ctx.fillStyle = color;

                roundRect(ctx, b.x, b.y, b.width, b.height, 3);
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 0.5;
                roundRect(ctx, b.x, b.y, b.width, b.height, 3);
                ctx.stroke();

                if (b.maxHits > 1 && b.hits > 1) {
                    ctx.globalAlpha = 0.6;
                    ctx.fillStyle = '#F5F5F4';
                    ctx.font = '600 10px Geist, system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(b.hits, b.x + b.width / 2, b.y + b.height / 2);
                }

                ctx.globalAlpha = 1;
            }
        }

        function drawPaddle() {
            const pw = getPaddleWidth();
            const laser = paddlePowerups.laser;
            const missile = paddlePowerups.missile;
            const shield = paddlePowerups.shield;
            const wide = paddlePowerups.wide;

            // Paddle powerups stack, but the glow can only show one color at
            // a time — pick by priority (offensive effects read most
            // prominently, then defensive, then the passive width boost).
            // Emitter dots below are independent per-effect, so e.g. laser
            // and missile dots both show at once even though the glow picks one.
            const glowSource = laser || missile || shield || wide;
            const glowType = laser ? 'laser' : missile ? 'missile' : shield ? 'shield' : wide ? 'wide' : null;
            const pLevel = glowSource ? glowSource.level : 0;
            const glowIntensity = pLevel > 0 ? 0.3 + pLevel * 0.15 : 0.4;
            if (glowType === 'laser') {
                ctx.shadowColor = `rgba(192, 132, 252, ${glowIntensity})`;
            } else if (glowType === 'missile') {
                ctx.shadowColor = `rgba(255, 215, 0, ${glowIntensity})`;
            } else if (glowType === 'shield') {
                ctx.shadowColor = `rgba(0, 206, 209, ${glowIntensity})`;
            } else if (glowType === 'wide') {
                ctx.shadowColor = `rgba(91, 184, 122, ${glowIntensity})`;
            } else {
                ctx.shadowColor = COLORS.paddleGlow;
            }
            ctx.shadowBlur = 12 + pLevel * 4;
            ctx.fillStyle = COLORS.paddle;
            roundRect(ctx, paddle.x, paddle.y, pw, paddle.height, 7);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Top highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            roundRect(ctx, paddle.x + 2, paddle.y, pw - 4, 2, 1);
            ctx.fill();

            // Missile emitter dots on paddle when missile is active
            if (missile) {
                const pulse = 0.5 + Math.sin(frameCount * 0.2) * 0.5;
                ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
                if (missile.level >= 3) {
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw * 0.33, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw * 0.67, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw / 2, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Laser emitter dots on paddle when laser is active
            if (laser) {
                const pulse = 0.5 + Math.sin(frameCount * 0.2) * 0.5;
                ctx.fillStyle = `rgba(192, 132, 252, ${pulse})`;
                if (laser.level >= 3) {
                    // Dual emitter dots at level 3
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw * 0.33, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw * 0.67, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(paddle.x + pw / 2, paddle.y + 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawBalls() {
            const glowBlur = 10;
            // Ball powerups stack, but the ball's trail/tint can only show
            // one look at a time — pick by priority (fireball reads most
            // prominently, then blast, then the subtler slow ripple). The
            // underlying gameplay effects (pierce, AoE, speed) still all
            // apply independently regardless of which one wins visually.
            const fireball = ballPowerups.fireball;
            const blast = ballPowerups.blast;
            const slow = ballPowerups.slow;
            const bType = fireball ? 'fireball' : blast ? 'blast' : slow ? 'slow' : null;
            const bLevel = fireball ? fireball.level : blast ? blast.level : slow ? slow.level : 0;
            // Visual radius scale by fireball level
            const fireVisualScale = bType === 'fireball' ? [1.0, 1.0, 1.3, 1.6][bLevel] : 1.0;

            for (const b of balls) {
                if (bType === 'fireball') {
                    // Flame trail: flickering ember particles along the path
                    for (let i = 0; i < b.trail.length; i++) {
                        const t = b.trail[i];
                        const progress = i / b.trail.length;
                        const flicker = 0.6 + Math.sin(frameCount * 0.3 + i * 1.5) * 0.4;
                        const alpha = progress * 0.5 * flicker;
                        const size = b.radius * fireVisualScale * (0.3 + progress * 0.7) * (0.8 + Math.sin(frameCount * 0.5 + i) * 0.3);

                        // Outer orange glow
                        ctx.beginPath();
                        ctx.arc(t.x + (Math.random() - 0.5) * 3, t.y + (Math.random() - 0.5) * 3, size * 1.4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 69, 0, ${alpha * 0.4})`;
                        ctx.fill();

                        // Inner yellow-white core
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size * 0.7, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, ${150 + Math.floor(progress * 100)}, ${50 + Math.floor(progress * 50)}, ${alpha})`;
                        ctx.fill();
                    }

                    // Ball with fire glow
                    ctx.shadowColor = 'rgba(255, 69, 0, 0.8)';
                    ctx.shadowBlur = 14 + bLevel * 4;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * fireVisualScale, 0, Math.PI * 2);
                    ctx.fillStyle = '#FF6B35';
                    ctx.fill();
                    // Bright core
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * fireVisualScale * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 220, 100, 0.7)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (bType === 'blast') {
                    // Blast: orange trail
                    for (let i = 0; i < b.trail.length; i++) {
                        const t = b.trail[i];
                        const progress = i / b.trail.length;
                        const alpha = progress * 0.3;
                        const size = b.radius * (0.4 + progress * 0.6);
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 165, 0, ${alpha})`;
                        ctx.fill();
                    }

                    // Expanding ring indicators (1 per level)
                    for (let r = 0; r < bLevel; r++) {
                        const ringSize = b.radius * (1.8 + r * 0.6) + Math.sin(frameCount * 0.12 + r * 2) * 3;
                        const ringAlpha = 0.15 + Math.sin(frameCount * 0.15 + r) * 0.1;
                        ctx.beginPath();
                        ctx.arc(b.x, b.y, ringSize, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 165, 0, ${ringAlpha})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    // Orange ball
                    ctx.shadowColor = 'rgba(255, 165, 0, 0.7)';
                    ctx.shadowBlur = 12 + bLevel * 3;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFA500';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 220, 150, 0.6)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (bType === 'slow') {
                    // Slow: cool blue trail with time-warp ripple
                    for (let i = 0; i < b.trail.length; i++) {
                        const t = b.trail[i];
                        const progress = i / b.trail.length;
                        const alpha = progress * (0.2 + bLevel * 0.05);
                        const size = b.radius * (0.4 + progress * 0.6);
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(91, 140, 184, ${alpha})`;
                        ctx.fill();
                    }

                    // Outer ripple ring(s) — more at higher levels
                    for (let r = 0; r < bLevel; r++) {
                        const ripple = Math.sin(frameCount * 0.08 + r * 1.2) * 0.3 + 0.5;
                        ctx.beginPath();
                        ctx.arc(b.x, b.y, b.radius * (2 + r * 0.8), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(91, 140, 184, ${ripple * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    // Ball with blue tint
                    ctx.shadowColor = 'rgba(91, 140, 184, 0.5)';
                    ctx.shadowBlur = 10 + bLevel * 3;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#8BB8D8';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    // Default trail
                    for (let i = 0; i < b.trail.length; i++) {
                        const t = b.trail[i];
                        const alpha = (i / b.trail.length) * 0.2;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, b.radius * (0.5 + i / b.trail.length * 0.5), 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(245, 245, 244, ${alpha})`;
                        ctx.fill();
                    }

                    // Default ball
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = COLORS.ball;
                    ctx.shadowColor = 'rgba(245, 245, 244, 0.4)';
                    ctx.shadowBlur = glowBlur;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        // --- Powerup icon draw functions ---
        function drawIconClock(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.stroke();
            // Hour hand
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - 4);
            ctx.stroke();
            // Minute hand
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 3, y);
            ctx.stroke();
        }

        function drawIconExpand(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            // Left arrow
            ctx.beginPath();
            ctx.moveTo(x - 2, y);
            ctx.lineTo(x - 7, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - 5, y - 3);
            ctx.lineTo(x - 7, y);
            ctx.lineTo(x - 5, y + 3);
            ctx.stroke();
            // Right arrow
            ctx.beginPath();
            ctx.moveTo(x + 2, y);
            ctx.lineTo(x + 7, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 5, y - 3);
            ctx.lineTo(x + 7, y);
            ctx.lineTo(x + 5, y + 3);
            ctx.stroke();
        }

        function drawIconExtraBall(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x - 2, y, 4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(x + 3, y - 1, 4, 0, Math.PI * 2);
            ctx.stroke();
            // Plus sign
            ctx.beginPath();
            ctx.moveTo(x + 6, y - 5);
            ctx.lineTo(x + 6, y - 1);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 4, y - 3);
            ctx.lineTo(x + 8, y - 3);
            ctx.stroke();
        }

        function drawIconHeart(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + 4);
            ctx.bezierCurveTo(x - 7, y - 1, x - 7, y - 6, x - 3.5, y - 6);
            ctx.bezierCurveTo(x - 1, y - 6, x, y - 4, x, y - 3);
            ctx.bezierCurveTo(x, y - 4, x + 1, y - 6, x + 3.5, y - 6);
            ctx.bezierCurveTo(x + 7, y - 6, x + 7, y - 1, x, y + 4);
            ctx.fill();
        }

        function drawIconFlame(ctx, x, y, color) {
            // Outer flame
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - 7);
            ctx.bezierCurveTo(x + 4, y - 3, x + 5, y + 2, x + 3, y + 5);
            ctx.quadraticCurveTo(x, y + 3, x, y + 6);
            ctx.quadraticCurveTo(x, y + 3, x - 3, y + 5);
            ctx.bezierCurveTo(x - 5, y + 2, x - 4, y - 3, x, y - 7);
            ctx.fill();
            // Inner bright core
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(x, y - 3);
            ctx.bezierCurveTo(x + 2, y - 1, x + 2.5, y + 1, x + 1.5, y + 3);
            ctx.quadraticCurveTo(x, y + 2, x, y + 4);
            ctx.quadraticCurveTo(x, y + 2, x - 1.5, y + 3);
            ctx.bezierCurveTo(x - 2.5, y + 1, x - 2, y - 1, x, y - 3);
            ctx.fill();
        }

        function drawIconLaser(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            // Vertical beam
            ctx.beginPath();
            ctx.moveTo(x, y - 7);
            ctx.lineTo(x, y + 7);
            ctx.stroke();
            // Emission ticks
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x - 4, y - 2);
            ctx.lineTo(x + 4, y - 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - 3, y + 2);
            ctx.lineTo(x + 3, y + 2);
            ctx.stroke();
        }

        function drawIconStarburst(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            const rays = 6;
            for (let i = 0; i < rays; i++) {
                const angle = (i / rays) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * 2, y + Math.sin(angle) * 2);
                ctx.lineTo(x + Math.cos(angle) * 7, y + Math.sin(angle) * 7);
                ctx.stroke();
            }
            // Center dot
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawIconShield(ctx, x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x, y - 7);
            ctx.lineTo(x + 6, y - 4);
            ctx.lineTo(x + 6, y + 1);
            ctx.quadraticCurveTo(x + 5, y + 5, x, y + 7);
            ctx.quadraticCurveTo(x - 5, y + 5, x - 6, y + 1);
            ctx.lineTo(x - 6, y - 4);
            ctx.closePath();
            ctx.stroke();
        }

        function drawIconRocket(ctx, x, y, color) {
            ctx.fillStyle = color;
            // Body
            ctx.beginPath();
            ctx.moveTo(x, y - 7);
            ctx.lineTo(x + 3, y + 2);
            ctx.lineTo(x - 3, y + 2);
            ctx.closePath();
            ctx.fill();
            // Fins
            ctx.beginPath();
            ctx.moveTo(x - 3, y + 1);
            ctx.lineTo(x - 5, y + 5);
            ctx.lineTo(x - 1, y + 3);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 3, y + 1);
            ctx.lineTo(x + 5, y + 5);
            ctx.lineTo(x + 1, y + 3);
            ctx.closePath();
            ctx.fill();
            // Exhaust
            ctx.fillStyle = '#FF4500';
            ctx.beginPath();
            ctx.moveTo(x - 1.5, y + 3);
            ctx.lineTo(x, y + 7);
            ctx.lineTo(x + 1.5, y + 3);
            ctx.closePath();
            ctx.fill();
        }

        const POWERUP_ICON_DRAWERS = {
            slow: drawIconClock,
            wide: drawIconExpand,
            extraBall: drawIconExtraBall,
            extraLife: drawIconHeart,
            fireball: drawIconFlame,
            laser: drawIconLaser,
            blast: drawIconStarburst,
            shield: drawIconShield,

            missile: drawIconRocket,
        };

        function drawCapsule() {
            if (!fallingCapsule) return;

            const def = POWERUP_TYPES[fallingCapsule.type];
            const capW = 40, capH = 20;
            const cx = fallingCapsule.x - capW / 2;
            const cy = fallingCapsule.y - capH / 2;

            // Dark fill with colored border
            ctx.fillStyle = 'rgba(26, 26, 24, 0.85)';
            roundRect(ctx, cx, cy, capW, capH, 10);
            ctx.fill();

            ctx.strokeStyle = def.color;
            ctx.lineWidth = 2;
            roundRect(ctx, cx, cy, capW, capH, 10);
            ctx.stroke();

            // Icon
            const drawIcon = POWERUP_ICON_DRAWERS[fallingCapsule.type];
            if (drawIcon) {
                ctx.save();
                drawIcon(ctx, fallingCapsule.x, fallingCapsule.y, def.color);
                ctx.restore();
            }
        }


        function drawParticles() {
            for (const p of particles) {
                const alpha = p.life / p.maxLife;
                const size = p.size * (p.life / p.maxLife);
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawLasers() {
            for (const l of lasers) {
                // Outer glow
                ctx.shadowColor = '#C084FC';
                ctx.shadowBlur = 8;
                ctx.fillStyle = 'rgba(192, 132, 252, 0.3)';
                ctx.fillRect(l.x - 2, l.y, 4, 14);
                // Bright core
                ctx.fillStyle = '#C084FC';
                ctx.fillRect(l.x - 1, l.y + 1, 2, 12);
                // Hot tip
                ctx.fillStyle = 'rgba(230, 200, 255, 0.8)';
                ctx.fillRect(l.x - 1, l.y, 2, 3);
                ctx.shadowBlur = 0;
            }
        }

        function drawShield() {
            if (!shieldState.active) return;
            const SHIELD_Y = getShieldY();

            if (shieldState.broken) {
                // Show fading regen progress for lv2+
                if (paddlePowerups.shield && paddlePowerups.shield.level >= 2) {
                    const progress = shieldState.regenTimer / 300;
                    ctx.globalAlpha = 0.15 + progress * 0.35;
                    const grad = ctx.createLinearGradient(0, SHIELD_Y, BASE_W, SHIELD_Y);
                    grad.addColorStop(0, 'rgba(0, 206, 209, 0)');
                    grad.addColorStop(0.3, 'rgba(0, 206, 209, 0.5)');
                    grad.addColorStop(0.7, 'rgba(0, 206, 209, 0.5)');
                    grad.addColorStop(1, 'rgba(0, 206, 209, 0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, SHIELD_Y);
                    ctx.lineTo(BASE_W, SHIELD_Y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
                return;
            }

            // Active shield line
            const pulse = 0.6 + Math.sin(frameCount * 0.1) * 0.2;
            const flashBoost = shieldState.hitFlashTimer > 0 ? 0.4 : 0;
            ctx.globalAlpha = pulse + flashBoost;
            ctx.shadowColor = 'rgba(0, 206, 209, 0.6)';
            ctx.shadowBlur = 10;
            const grad = ctx.createLinearGradient(0, SHIELD_Y, BASE_W, SHIELD_Y);
            grad.addColorStop(0, 'rgba(0, 206, 209, 0)');
            grad.addColorStop(0.2, 'rgba(0, 206, 209, 0.8)');
            grad.addColorStop(0.5, 'rgba(0, 206, 209, 1)');
            grad.addColorStop(0.8, 'rgba(0, 206, 209, 0.8)');
            grad.addColorStop(1, 'rgba(0, 206, 209, 0)');
            ctx.strokeStyle = grad;
            ctx.lineWidth = shieldState.hitFlashTimer > 0 ? 4 : 2;
            ctx.beginPath();
            ctx.moveTo(0, SHIELD_Y);
            ctx.lineTo(BASE_W, SHIELD_Y);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }

        function drawMissiles() {
            for (const m of missiles) {
                // Trail particles
                if (frameCount % 2 === 0) {
                    createParticles(m.x, m.y + 4, '#FFD700', 1);
                }

                // Rotate to face velocity
                const angle = Math.atan2(m.dy, m.dx);
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(angle + Math.PI / 2);

                // Missile body
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 6;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(-2.5, 4);
                ctx.lineTo(2.5, 4);
                ctx.closePath();
                ctx.fill();

                // Bright tip
                ctx.fillStyle = 'rgba(255, 255, 220, 0.9)';
                ctx.beginPath();
                ctx.arc(0, -4, 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // --- Game loop ---
        // Paddle speed, ball speed, laser/missile cooldowns, particle motion,
        // and every other "N per frame" constant below only produce a
        // consistent real-world speed on a device sustaining exactly 60fps -
        // anything slower (mobile is more likely to drop frames redrawing
        // this canvas) simply moves everything slower in real time. timeScale
        // converts each frame's real elapsed time into "how many 1/60s
        // reference frames' worth of motion should happen now", so speed
        // stays constant across devices. Same fix as games/jezzball.html.
        let lastFrameTime = null;

        function loop(now) {
            let timeScale = 1;
            if (lastFrameTime !== null) {
                const dt = now - lastFrameTime;
                // Clamp elapsed time so a stutter or returning from a
                // backgrounded tab can't let a ball tunnel through a brick
                // row in one oversized step.
                timeScale = Math.min(dt, 50) / (1000 / 60);
            }
            lastFrameTime = now;

            if (gameState === 'playing') {
                frameCount += timeScale;
                updatePaddle(timeScale);
                updateCapsule(timeScale);
                updateBalls(timeScale);
                updateBlastQueue(timeScale);
                updateParticles(timeScale);
                updateLasers(timeScale);
                updateShield(timeScale);
                updateMissiles(timeScale);
                updatePowerupTimers(timeScale);

            }
            draw();
            updateHUD();
            requestAnimationFrame(loop);
        }

        // Start loop
        requestAnimationFrame(loop);
        showOverlay('start');

    })();
    </script>
</body>

</html>
