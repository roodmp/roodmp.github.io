    .gauge-container {

    .gauge-marker {

    /* ── Reset Link ── */

    .group-header {

    /* ── Two-Column Layout ── */

    }
  </style>

  <script>
    (function () {
      'use strict';

      var h = React.createElement;
      var useState = React.useState;
      var useMemo = React.useMemo;
      var useCallback = React.useCallback;
      var useRef = React.useRef;
      var useEffect = React.useEffect;
      var ToggleButton = MaterialUI.ToggleButton;
      var ToggleButtonGroup = MaterialUI.ToggleButtonGroup;
      var ThemeProvider = MaterialUI.ThemeProvider;
      var createTheme = MaterialUI.createTheme;

      // ── MUI Theme ──
      var muiTheme = createTheme({
        palette: {
          mode: 'dark',
          primary: { main: '#E8845A' }
        }
      });

      // ── ToggleButtonGroup sx (shared) ──
      var toggleButtonGroupSx = {
        width: '100%',
        flexWrap: 'wrap',
        gap: '4px',
        '& .MuiToggleButtonGroup-grouped': {
          border: '1px solid #3E3E3A',
          borderRadius: '6px !important',
          margin: 0,
          padding: '4px 10px',
          fontSize: '11px',
          fontFamily: 'var(--font-sans)',
          fontWeight: 500,
          color: '#8B8B87',
          backgroundColor: '#2A2A28',
          textTransform: 'none',
          lineHeight: 1.4,
          '&:hover': {
            backgroundColor: '#353532',
            borderColor: '#4E4E4A'
          },
          '&.Mui-selected': {
            backgroundColor: '#E8845A',
            color: '#1A1A18',
            borderColor: '#E8845A',
            fontWeight: 600,
            '&:hover': {
              backgroundColor: '#D4754D'
            }
          }
        }
      };

      // ── Slider Configs ──
      var SLIDER_CONFIGS = {
        duration: {
          name: 'How long would it take manually?',
          desc: 'Time to complete this task yourself, without AI help.',
          labels: ['1 min', '5 min', '15 min', '30 min', '1 hr', '2 hr', '4 hr', '8+ hr']
        },
        frequency: {
          name: 'Frequency',
          desc: 'How often do you do this task?',
          labels: ['One-off', 'Yearly', 'Monthly', 'Weekly', 'Daily', 'Multi/day']
        },
        quality: {
          name: 'Quality Bar',
          desc: 'How polished does the final output need to be?',
          labels: ['Rough Draft', 'Decent', 'Good', 'Great', 'Excellent']
        },
        deadline: {
          name: 'Deadline',
          desc: 'How urgently do you need the result?',
          labels: ['Whenever', 'This month', 'This week', 'Tomorrow', 'Right now']
        },
        domain: {
          name: 'Domain Knowledge Required',
          desc: 'How much specialized expertise does the task demand?',
          labels: ['General', 'Some Context', 'Moderate', 'Specialized', 'Deep']
        },
        clarity: {
          name: 'Task Clarity',
          desc: 'How well-defined is what you need?',
          labels: ['Exact spec', 'Mostly clear', 'Somewhat vague', 'Rough idea', 'No clue']
        },
        verification: {
          name: 'Verification Difficulty',
          desc: 'How hard is it to tell if the AI output is correct?',
          labels: ['Obvious', 'Quick check', 'Careful review', 'Expert review', 'Nearly impossible']
        }
      };

      var DURATION_MINUTES = [1, 5, 15, 30, 60, 120, 240, 480];
      var FREQUENCY_MULTIPLIERS = [1, 1, 12, 52, 365, 1000];

      var INITIAL_VALUES = {
        duration: 2, frequency: 2, quality: 2, deadline: 0,
        domain: 0, clarity: 1, verification: 1
      };

      // ── Scoring ──
      function computeScore(v) {
        var minutesPerOccurrence = DURATION_MINUTES[v.duration];
        var annualOccurrences = FREQUENCY_MULTIPLIERS[v.frequency];
        var annualMinutes = minutesPerOccurrence * annualOccurrences;
        var annualHours = annualMinutes / 60;

        var logHours = Math.log10(Math.max(annualHours, 0.01));
        var benefitRaw = ((logHours + 2) / 6) * 50;
        var benefit = Math.max(0, Math.min(50, benefitRaw));

        var deadlineBonus = v.deadline * 2;
        benefit = Math.min(50, benefit + deadlineBonus);

        var qualityCost = v.quality * 4;
        var domainCost = v.domain * 4.5;
        var clarityCost = v.clarity * 3.5;
        var verifyCost = v.verification * 5;
        var totalCost = qualityCost + domainCost + clarityCost + verifyCost;

        if (v.deadline >= 3 && v.verification >= 3) totalCost += 8;

        var score = Math.round(Math.max(0, Math.min(100, benefit - totalCost + 50)));

        return {
          score: score,
          annualHours: annualHours,
          factors: {
            benefit: Math.round(benefit),
            deadlineBonus: Math.round(deadlineBonus),
            qualityCost: Math.round(qualityCost),
            domainCost: Math.round(domainCost),
            clarityCost: Math.round(clarityCost),
            verifyCost: Math.round(verifyCost)
          }
        };
      }

      function lerpColor(a, b, t) {
        var ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
        var br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
        var r = Math.round(ar + (br - ar) * t), g = Math.round(ag + (bg - ag) * t), bl = Math.round(ab + (bb - ab) * t);
        return '#' + ((1 << 24) + (r << 16) + (g << 8) + bl).toString(16).slice(1);
      }

      function scoreToColor(score) {
        var t = Math.max(0, Math.min(100, score)) / 100;
        if (t <= 0.5) return lerpColor('#C97373', '#D4A857', t / 0.5);
        return lerpColor('#D4A857', '#7CB97E', (t - 0.5) / 0.5);
      }

      function getVerdict(score) {
        var color = scoreToColor(score);
        if (score <= 25) return { label: 'Skip the AI', color: color };
        if (score <= 50) return { label: 'Probably not worth it', color: color };
        if (score <= 75) return { label: 'AI could help here', color: color };
        return { label: 'AI is made for this', color: color };
      }

      function getCommentary(v) {
        var durationMin = DURATION_MINUTES[v.duration];

        if (durationMin <= 5) {
          return { text: 'For tasks under five minutes, the overhead of prompting, reviewing, and editing AI output usually exceeds the time you\u2019d spend just doing it. AI shines when the task is long enough to absorb that fixed cost.', label: 'Overhead exceeds the task' };
        }
        if (v.deadline >= 3 && v.verification >= 3) {
          return { text: "Tight deadlines and hard-to-verify output are a risky combination. You won't have time to catch subtle errors, and rushing verification is how mistakes ship. If you use AI here, budget extra time for review, or scope down what AI handles.", label: 'Deadline trap' };
        }
        if (v.deadline >= 3 && v.verification <= 1) {
          return { text: 'When time is short and you can quickly sanity-check the result, AI is your best co-pilot. Speed matters, and the verification cost is low.', label: 'Deadline crunch' };
        }
        if (v.domain >= 3 && v.verification >= 3) {
          return { text: "In specialized domains, AI errors tend to be subtle rather than obvious. A plausible-sounding answer with a wrong detail buried inside. The more niche the field and the harder it is to verify, the more dangerous this becomes. Consider using AI for structure and drafting, then applying your expertise to the substance.", label: 'Subtle error risk' };
        }
        if (v.clarity <= 1 && v.domain >= 3) {
          return { text: "When you can give AI a precise spec, even specialized tasks become viable. Clear instructions reduce ambiguity, the main source of AI errors. The domain expertise still matters for verification, but you're starting from a much better position.", label: 'Spec overcomes complexity' };
        }
        if (durationMin >= 60 && v.frequency >= 3 && v.quality <= 1 && v.verification <= 1) {
          return { text: "This is the AI sweet spot. Long, repetitive tasks where 'good enough' quality is fine and you can easily check the output. Let the machine do the heavy lifting.", label: 'Sweet spot' };
        }
        if (v.quality >= 3) {
          return { text: "AI gets you a solid first draft fast, but high-quality output still needs your editing pass. The higher the bar, the more time you spend reshaping AI output to match your standards. The question isn't whether AI helps, it's whether the draft-then-edit workflow beats your normal process.", label: 'Diminishing returns' };
        }
        if (v.verification >= 4) {
          return { text: "If you can't tell whether the output is correct, does it matter how fast it was generated? Unverifiable AI output is a liability, not an asset.", label: 'Verification paradox' };
        }
        if (v.frequency >= 4 && v.quality <= 2) {
          return { text: "High-frequency tasks are where AI ROI compounds. Even small time savings per occurrence add up fast at this volume. Invest time upfront in getting the prompt right. It pays dividends across every future run.", label: 'Compounding returns' };
        }

        var result = computeScore(v);
        if (result.score > 70) {
          return { text: "This looks like a strong use case. The time savings are real, and the output is verifiable enough that you can catch issues quickly. Use AI for the heavy lifting and focus your energy on review.", label: 'Strong use case' };
        }
        if (result.score < 30) {
          return { text: "The task needs too much specialized judgment or is too hard to verify for AI to reliably help. Your domain knowledge is doing the real work here. AI would just add a review step without saving meaningful time.", label: 'Human advantage' };
        }
        return { text: "Could go either way. Try it once: prompt the task, time the full cycle including review, and compare. One real test beats any calculator.", label: 'Worth an experiment' };
      }

      function formatHours(hours) {
        if (hours < 1) {
          var mins = Math.round(hours * 60);
          return mins + ' min' + (mins !== 1 ? 's' : '') + '/yr';
        }
        if (hours < 24) return Math.round(hours * 10) / 10 + ' hrs/yr';
        return Math.round(hours / 8 * 10) / 10 + ' work days/yr';
      }

      // ── SliderCard Component ──
      function SliderCard(props) {
        var cfg = SLIDER_CONFIGS[props.sliderKey];

        return h('div', { className: 'slider-card' },
          h('div', { className: 'slider-name' }, cfg.name),
          h('div', { className: 'slider-desc' }, cfg.desc),
          h(ToggleButtonGroup, {
            exclusive: true,
            value: props.value,
            onChange: function (e, newVal) {
              if (newVal !== null) props.onChange(props.sliderKey, newVal);
            },
            'aria-label': cfg.name,
            sx: toggleButtonGroupSx
          },
            cfg.labels.map(function (label, i) {
              return h(ToggleButton, { key: i, value: i }, label);
            })
          )
        );
      }

      // ── FactorBar Component ──
      function FactorBar(props) {
        var pct = Math.min(100, (props.value / props.max) * 100);
        return h('div', { className: 'factor-row' },
          h('span', { className: 'factor-name' }, props.name),
          h('div', { className: 'factor-bar-track' },
            h('div', {
              className: 'factor-bar-fill ' + props.type,
              style: { width: pct + '%' }
            })
          ),
          h('span', { className: 'factor-value' }, props.prefix + props.value)
        );
      }

      // ── Main App ──
      function App() {
        var _state = useState(INITIAL_VALUES);
        var values = _state[0];
        var setValues = _state[1];
        var commentaryRef = useRef(null);
        var prevCommentaryRef = useRef('');

        var handleChange = useCallback(function (key, val) {
          setValues(function (prev) {
            var next = {};
            for (var k in prev) next[k] = prev[k];
            next[key] = val;
            return next;
          });
        }, []);

        var handleReset = useCallback(function () {
          setValues(INITIAL_VALUES);
        }, []);

        var isModified = useMemo(function () {
          for (var k in INITIAL_VALUES) {
            if (values[k] !== INITIAL_VALUES[k]) return true;
          }
          return false;
        }, [values]);

        var result = useMemo(function () { return computeScore(values); }, [values]);
        var verdict = useMemo(function () { return getVerdict(result.score); }, [result.score]);
        var commentary = useMemo(function () { return getCommentary(values); }, [values]);
        var f = result.factors;

        // Fade commentary on change
        useEffect(function () {
          var el = commentaryRef.current;
          if (!el || prevCommentaryRef.current === commentary.text) return;
          el.style.opacity = '0';
          var timer = setTimeout(function () {
            el.style.opacity = '1';
            prevCommentaryRef.current = commentary.text;
          }, 150);
          return function () { clearTimeout(timer); };
        }, [commentary.text]);

        // ── Render ──
        return h(ThemeProvider, { theme: muiTheme },
          h('div', { className: 'two-col' },

            // Left column: Inputs
            h('div', null,

              // About the Work
              h('div', { className: 'slider-group' },
                h('div', { className: 'group-header' },
                  h('div', { className: 'group-label' }, 'About the Work'),
                  isModified ? h('button', { className: 'reset-link', onClick: handleReset }, 'Reset all') : null
                ),
                h(SliderCard, { sliderKey: 'duration', value: values.duration, onChange: handleChange }),
                h(SliderCard, { sliderKey: 'frequency', value: values.frequency, onChange: handleChange }),
                h(SliderCard, { sliderKey: 'deadline', value: values.deadline, onChange: handleChange })
              ),

              // About the Output
              h('div', { className: 'slider-group' },
                h('div', { className: 'group-label' }, 'About the Output'),
                h(SliderCard, { sliderKey: 'quality', value: values.quality, onChange: handleChange }),
                h(SliderCard, { sliderKey: 'domain', value: values.domain, onChange: handleChange }),
                h(SliderCard, { sliderKey: 'clarity', value: values.clarity, onChange: handleChange }),
                h(SliderCard, { sliderKey: 'verification', value: values.verification, onChange: handleChange })
              )
            ),

            // Right column: Results (sticky)
            h('div', { className: 'results-col' },
              h('div', { className: 'group-label' }, 'The Verdict'),

              // Verdict + Commentary
              h('section', { className: 'verdict-section', 'aria-live': 'polite' },
                h('div', { className: 'gauge-container' },
                  h('div', { className: 'gauge-fill' }),
                  h('div', { className: 'gauge-marker', style: { left: result.score + '%' } })
                ),
                h('div', { className: 'verdict-label', style: { color: verdict.color } }, verdict.label),
                h('div', { className: 'time-savings' },
                  h('svg', { width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
                    h('circle', { cx: 12, cy: 12, r: 10 }),
                    h('polyline', { points: '12 6 12 12 16 14' })
                  ),
                  h('span', null, 'Estimated annual time: '),
                  h('span', { className: 'value' }, formatHours(result.annualHours))
                ),
                h('div', { className: 'commentary-wrap' },
                  h('p', { className: 'commentary-text', ref: commentaryRef }, commentary.text),
                  h('span', { className: 'commentary-label-tag' }, commentary.label)
                ),

                // Factor Breakdown (collapsible)
                h('details', { className: 'breakdown-section' },
                  h('summary', null,
                    'Factor Breakdown',
                    h('svg', { className: 'chevron', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
                      h('polyline', { points: '9 18 15 12 9 6' })
                    )
                  ),
                  h('div', { className: 'breakdown-content' },
                    h(FactorBar, { name: 'Time savings', value: f.benefit, max: 50, type: 'positive', prefix: '+' }),
                    h(FactorBar, { name: 'Deadline bonus', value: f.deadlineBonus, max: 10, type: 'positive', prefix: '+' }),
                    h(FactorBar, { name: 'Quality cost', value: f.qualityCost, max: 20, type: 'negative', prefix: '-' }),
                    h(FactorBar, { name: 'Domain cost', value: f.domainCost, max: 20, type: 'negative', prefix: '-' }),
                    h(FactorBar, { name: 'Clarity cost', value: f.clarityCost, max: 16, type: 'negative', prefix: '-' }),
                    h(FactorBar, { name: 'Verification cost', value: f.verifyCost, max: 20, type: 'negative', prefix: '-' })
                  )
                )
              )
            )
          )
        );
      }

      // ── Mount ──
      var root = ReactDOM.createRoot(document.getElementById('ai-app'));
      root.render(h(App));
    })();
  </script>
</body>

</html>
