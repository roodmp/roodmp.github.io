<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mark Rood - Builder / Product Manager</title>
  <meta name="description" content="Product Manager building assistive and agentic AI features. 10+ years in IT and systems engineering.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Mark Rood - Builder / Product Manager">
  <meta property="og:description" content="Product Manager building assistive and agentic AI features. 10+ years in IT and systems engineering.">
  <meta property="og:image" content="https://roodmp.github.io/assets/image/me_dog.png">
  <meta property="og:url" content="https://roodmp.github.io/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mark Rood - Builder / Product Manager">
  <meta name="twitter:description" content="Product Manager building assistive and agentic AI features. 10+ years in IT and systems engineering.">
  <meta name="twitter:image" content="https://roodmp.github.io/assets/image/me_dog.png">

  <link rel="icon" type="image/x-icon" href="favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-sans/style.min.css" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Design System -->
  <link rel="stylesheet" href="design-system.css" />

  <!-- Icons -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.28.0/feather.min.js"
    integrity="sha512-7x3zila4t2qNycrtZ31HO0NnJr8kg2VI67YLoRSyi9hGhRN66FHYWr7Axa9Y1J9tGYHVBPqIjSE1ogHrJTz51g=="
    crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>

  <!-- Main JS -->
  <script src="main.js" defer></script>

  <style>
    /* ── Workspace Layout ── */
    .workspace-layout {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Filter Dropdowns ── */
    .filter-dropdown {
      position: relative;
    }

    .filter-dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }

    .filter-dropdown-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--surface-border-accent);
    }

    .filter-dropdown-btn.has-active {
      border-color: var(--accent-500);
      color: var(--text-primary);
    }

    .filter-dropdown-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .filter-dropdown-chevron {
      width: 12px !important;
      height: 12px !important;
      opacity: 0.4 !important;
      transition: transform var(--transition-fast);
    }

    .filter-dropdown.open .filter-dropdown-chevron {
      transform: rotate(180deg);
    }

    .filter-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 180px;
      background: var(--bg-elevated);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: 4px;
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }

    .filter-dropdown.open .filter-dropdown-menu {
      display: block;
    }

    .filter-dropdown-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
      padding: 6px 10px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: left;
    }

    .filter-dropdown-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .filter-dropdown-item.active {
      background: rgba(74, 103, 133, 0.2);
      color: var(--text-primary);
    }

    .filter-dropdown-item .filter-count {
      margin-left: auto;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* ── Main Content ── */
    .workspace-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .workspace-topbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-6);
      padding-top: 84px;
      border-bottom: 1px solid var(--surface-border);
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .topbar-count {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-weight: 400;
      margin-left: var(--space-1);
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 280px;
    }

    .search-wrapper svg {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 6px var(--space-3) 6px 32px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-500);
      box-shadow: 0 0 0 3px rgba(74, 103, 133, 0.15);
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-kbd {
      position: absolute;
      right: var(--space-2);
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--text-tertiary);
      background: var(--bg-elevated);
      border: 1px solid var(--surface-border);
      border-radius: 3px;
      padding: 1px 5px;
      pointer-events: none;
    }


    .view-toggle {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
      background: var(--bg-secondary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: 2px;
    }

    .view-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 28px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .view-toggle-btn:hover {
      color: var(--text-secondary);
    }

    .view-toggle-btn.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .view-toggle-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ── Board View ── */
    .board-container {
      display: flex;
      gap: var(--space-5);
      padding: var(--space-5) var(--space-6);
      flex: 1;
      overflow-x: auto;
      align-items: flex-start;
    }

    .board-column {
      flex: 1;
      min-width: 260px;
      max-width: 400px;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0 var(--space-1);
      margin-bottom: var(--space-3);
    }

    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column-dot.shipped { background: var(--success); }
    .column-dot.in-progress { background: var(--warning); }
    .column-dot.backlog { background: var(--text-tertiary); }

    .column-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .column-count {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .column-cards {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-height: 60px;
      padding: var(--space-1);
      border-radius: var(--radius-md);
      transition: background var(--transition-fast);
    }

    .column-cards.drag-over {
      background: rgba(74, 103, 133, 0.06);
    }

    /* ── Project Card (Board) ── */
    .project-card {
      background: var(--surface-primary);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
    }

    .project-card:hover {
      border-color: var(--surface-border-accent);
      background: var(--bg-elevated);
    }

    .project-card.dragging {
      opacity: 0.4;
      transform: rotate(2deg);
    }

    .project-card-id {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }

    .project-card-name {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
      line-height: 1.4;
    }

    .project-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .project-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 1px 8px;
      border-radius: var(--radius-full);
      background: rgba(74, 103, 133, 0.1);
      color: var(--accent-300);
    }

    .project-tag.tool { background: rgba(124, 185, 126, 0.1); color: var(--success); }
    .project-tag.app { background: rgba(74, 103, 133, 0.1); color: var(--accent-300); }
    .project-tag.game { background: rgba(232, 132, 90, 0.1); color: var(--panda-300); }
    .project-tag.design { background: rgba(212, 168, 87, 0.1); color: var(--warning); }
    .project-tag.extension { background: rgba(201, 115, 115, 0.1); color: var(--error); }
    .project-tag.bot { background: rgba(139, 167, 189, 0.1); color: var(--text-accent); }
    .project-tag.meta { background: rgba(232, 132, 90, 0.15); color: var(--panda-400); }
    .project-tag.concept { background: rgba(107, 107, 103, 0.15); color: var(--text-secondary); }

    /* ── List View ── */
    .list-container {
      padding: var(--space-5) var(--space-6);
      flex: 1;
    }

    .list-table {
      width: 100%;
      border-collapse: collapse;
    }

    .list-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--surface-border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color var(--transition-fast);
    }

    .list-table th:hover {
      color: var(--text-secondary);
    }

    .list-table th.sorted {
      color: var(--text-primary);
    }

    .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      vertical-align: middle;
    }

    .list-table td {
      padding: var(--space-3);
      border-bottom: 1px solid var(--surface-border-subtle);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      vertical-align: middle;
    }

    .list-table tbody tr {
      cursor: pointer;
      transition: background var(--transition-fast);
      user-select: none;
    }

    .list-table tbody tr:hover {
      background: var(--bg-hover);
    }

    .list-table tbody tr.dragging {
      opacity: 0.4;
    }

    .list-table tbody tr.drag-over td {
      border-top: 2px solid var(--accent-500);
    }

    .list-project-name {
      color: var(--text-primary);
      font-weight: 500;
    }

    .list-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }

    .list-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .list-status-dot.shipped { background: var(--success); }
    .list-status-dot.in-progress { background: var(--warning); }
    .list-status-dot.backlog { background: var(--text-tertiary); }

    .list-drag-handle {
      width: 16px;
      color: var(--text-tertiary);
      opacity: 0;
      transition: opacity var(--transition-fast);
      cursor: grab;
    }

    .list-table tbody tr:hover .list-drag-handle {
      opacity: 1;
    }

    /* ── Detail Panel ── */
    .detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      justify-content: flex-end;
      visibility: hidden;
      pointer-events: none;
    }

    .detail-overlay.open {
      visibility: visible;
      pointer-events: auto;
    }

    .detail-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background var(--transition-slow);
    }

    .detail-overlay.open .detail-backdrop {
      background: rgba(0, 0, 0, 0.5);
    }

    .detail-panel {
      position: relative;
      width: 100%;
      max-width: 500px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--surface-border);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform var(--transition-slow);
    }

    .detail-overlay.open .detail-panel {
      transform: translateX(0);
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--surface-border);
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 1;
    }

    .detail-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: none;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .detail-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--surface-border-accent);
    }

    .detail-close svg {
      width: 16px;
      height: 16px;
    }

    .detail-id {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    .detail-body {
      padding: var(--space-6);
    }

    .detail-image {
      width: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--surface-border);
      margin-bottom: var(--space-5);
      object-fit: cover;
    }

    .detail-name {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-6);
      letter-spacing: -0.02em;
    }

    .detail-field {
      margin-bottom: var(--space-5);
    }

    .detail-field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: var(--space-2);
    }

    .detail-field-value {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .detail-status-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 500;
      border-radius: var(--radius-full);
    }

    .detail-status-badge.shipped {
      background: var(--success-muted);
      color: var(--success);
    }

    .detail-status-badge.in-progress {
      background: var(--warning-muted);
      color: var(--warning);
    }

    .detail-status-badge.backlog {
      background: rgba(107, 107, 103, 0.12);
      color: var(--text-secondary);
    }

    .detail-status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .detail-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--accent-300);
      background: rgba(74, 103, 133, 0.1);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: all var(--transition-fast);
    }

    .detail-link:hover {
      background: rgba(74, 103, 133, 0.2);
      color: var(--accent-200);
    }

    .detail-link svg {
      width: 14px;
      height: 14px;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-6);
      text-align: center;
      color: var(--text-tertiary);
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }

    .empty-state p {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      margin: 0;
    }

    /* ── Hidden utility ── */
    .hidden {
      display: none !important;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .board-container {
        padding: var(--space-4);
      }

      .board-column {
        min-width: 240px;
      }

      .workspace-topbar {
        padding: var(--space-3) var(--space-4);
        padding-top: 80px;
        gap: var(--space-3);
      }

      .topbar-title {
        font-size: var(--text-sm);
      }

      .search-wrapper {
        max-width: unset;
        order: 10;
        flex-basis: 100%;
      }

      .search-kbd {
        display: none;
      }

      .topbar-filters {
        order: 11;
        flex-basis: 100%;
      }

      .list-container {
        padding: var(--space-4);
        overflow-x: auto;
      }

      .list-table {
        min-width: 500px;
      }

      .detail-panel {
        max-width: 100%;
      }

      .view-toggle {
        margin-left: 0;
      }

      .project-card {
        padding: var(--space-3);
      }
    }

    @media (max-width: 640px) {
      .workspace-topbar {
        padding-top: var(--space-3);
      }
    }

    @media (max-width: 480px) {
      .detail-body {
        padding: var(--space-4);
      }

      .detail-header {
        padding: var(--space-4);
      }

      .detail-name {
        font-size: var(--text-xl);
      }
    }

    /* ── Topbar filters container ── */
    .topbar-filters {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
  </style>
</head>

<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Geometric Background -->
  <div class="geo-bg"></div>

  <!-- Floating Navigation -->
  <header class="floating-header">
    <nav class="floating-nav">
      <a href="about.html" class="nav-logo">
        <img src="favicon.png" alt="Mark Rood" />
      </a>
      <div class="nav-links">
        <a href="about.html" class="nav-link active">About</a>
        <a href="index.html" class="nav-link">Resum&eacute;</a>
        <a href="resources.html" class="nav-link">Resources</a>
      </div>
      <button class="mobile-menu-btn" aria-label="Open menu">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu">
    <button class="mobile-menu-close" aria-label="Close menu">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <a href="about.html" class="nav-link active">About</a>
    <a href="index.html" class="nav-link">Resum&eacute;</a>
    <a href="resources.html" class="nav-link">Resources</a>
  </div>

  <!-- Workspace -->
  <div class="workspace-layout" id="main-content">
    <!-- Main -->
    <main class="workspace-main">
      <!-- Top Bar -->
      <div class="workspace-topbar">
        <div class="topbar-title">
          Projects
          <span class="topbar-count" id="projectCount"></span>
        </div>
        <div class="search-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search projects..." aria-label="Search projects" />

        link: 'pswindowsupdate.html',

    ];

    // ── State ──
    const state = {
      currentView: 'board',
      searchQuery: '',
      filterStatus: null,
      filterType: null,
      sortBy: 'status',
      sortDirection: 'asc',
      selectedProject: null,
      draggedId: null
    };

    // ── Helpers ──
    const statusOrder = { 'backlog': 0, 'in-progress': 1, 'shipped': 2 };
    const statusLabels = { 'shipped': 'Completed', 'in-progress': 'In Progress', 'backlog': 'Backlog' };

    function getFilteredProjects() {
      return projects.filter(p => {
        if (state.searchQuery) {
          const q = state.searchQuery.toLowerCase();
          const match = p.name.toLowerCase().includes(q) ||
            p.description.toLowerCase().includes(q) ||
            p.tags.some(t => t.toLowerCase().includes(q)) ||
            p.id.toLowerCase().includes(q);
          if (!match) return false;
        }
        if (state.filterStatus && p.status !== state.filterStatus) return false;
        if (state.filterType && p.type !== state.filterType) return false;
        return true;
      });
    }

    function getSortedProjects(list) {
      const sorted = [...list];
      sorted.sort((a, b) => {
        let cmp = 0;
        if (state.sortBy === 'name') {
          cmp = a.name.localeCompare(b.name);
        } else if (state.sortBy === 'status') {
          cmp = statusOrder[a.status] - statusOrder[b.status];
        } else if (state.sortBy === 'type') {
          cmp = a.type.localeCompare(b.type);
        }
        return state.sortDirection === 'asc' ? cmp : -cmp;
      });
      return sorted;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Render: Filter Counts ──
    function renderFilterCounts() {
      const shipped = projects.filter(p => p.status === 'shipped').length;
      const inProgress = projects.filter(p => p.status === 'in-progress').length;
      const backlog = projects.filter(p => p.status === 'backlog').length;
      document.getElementById('countShipped').textContent = shipped;
      document.getElementById('countInProgress').textContent = inProgress;
      document.getElementById('countBacklog').textContent = backlog;
    }

    // ── Render: Board View ──
    function renderBoardView() {
      const container = document.getElementById('boardView');
      const filtered = getFilteredProjects();
      const columns = ['backlog', 'in-progress', 'shipped'];

      let html = '';
      columns.forEach(status => {
        const cards = filtered.filter(p => p.status === status);
        html += `
          <div class="board-column" data-status="${status}">
            <div class="column-header">
              <div class="column-dot ${status}"></div>
              <span class="column-title">${statusLabels[status]}</span>
              <span class="column-count">${cards.length}</span>
            </div>
            <div class="column-cards" data-status="${status}"
                 ondragover="onColumnDragOver(event)"
                 ondragleave="onColumnDragLeave(event)"
                 ondrop="onColumnDrop(event, '${status}')">
              ${cards.length === 0 ? `
                <div class="empty-state" style="padding: var(--space-8) var(--space-4);">
                  <p>No projects</p>
                </div>
              ` : cards.map(p => `
                <div class="project-card"
                     draggable="true"
                     data-id="${p.id}"
                     ondragstart="onCardDragStart(event, '${p.id}')"
                     ondragend="onCardDragEnd(event)"
                     onclick="openDetailPanel('${p.id}')">
                  <div class="project-card-id">${p.id}</div>
                  <div class="project-card-name">${escapeHtml(p.name)}</div>
                  <div class="project-card-tags">
                    ${p.tags.map(t => `<span class="project-tag ${t}">${t}</span>`).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // ── Render: List View ──
    function renderListView() {
      const container = document.getElementById('listView');
      const filtered = getSortedProjects(getFilteredProjects());

      const sortArrow = (col) => {
        if (state.sortBy !== col) return '';
        return `<span class="sort-arrow">${state.sortDirection === 'asc' ? '\u2191' : '\u2193'}</span>`;
      };

      const sortedClass = (col) => state.sortBy === col ? ' sorted' : '';

      let html = `
        <table class="list-table">
          <thead>
            <tr>
              <th style="width:28px;"></th>
              <th class="${sortedClass('name')}" onclick="onSortClick('name')">Project${sortArrow('name')}</th>
              <th class="${sortedClass('status')}" onclick="onSortClick('status')">Status${sortArrow('status')}</th>
              <th class="${sortedClass('type')}" onclick="onSortClick('type')">Type${sortArrow('type')}</th>
              <th>Tags</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (filtered.length === 0) {
        html += `
          <tr>
            <td colspan="5">
              <div class="empty-state">
                <p>No projects match your filters</p>
              </div>
            </td>
          </tr>
        `;
      } else {
        filtered.forEach(p => {
          html += `
            <tr draggable="true"
                data-id="${p.id}"
                ondragstart="onRowDragStart(event, '${p.id}')"
                ondragend="onRowDragEnd(event)"
                ondragover="onRowDragOver(event)"
                ondragleave="onRowDragLeave(event)"
                ondrop="onRowDrop(event, '${p.id}')"
                onclick="openDetailPanel('${p.id}')">
              <td>
                <svg class="list-drag-handle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/>
                  <circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/>
                  <circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/>
                </svg>
              </td>
              <td class="list-project-name">${escapeHtml(p.name)}</td>
              <td>
                <span class="list-status">
                  <span class="list-status-dot ${p.status}"></span>
                  ${statusLabels[p.status]}
                </span>
              </td>
              <td>${p.type}</td>
              <td>
                <div class="project-card-tags">
                  ${p.tags.map(t => `<span class="project-tag ${t}">${t}</span>`).join('')}
                </div>
              </td>
            </tr>
          `;
        });
      }

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // ── Render: Project Count ──
    function renderProjectCount() {
      const filtered = getFilteredProjects();
      document.getElementById('projectCount').textContent = `\u00b7 ${filtered.length}`;
    }

    // ── Render All ──
    function renderAll() {
      renderFilterCounts();
      renderProjectCount();
      updateFilterActive();
      if (state.currentView === 'board') {
        renderBoardView();
      } else {
        renderListView();
      }
    }

    // ── View Switching ──
    function switchView(view) {
      state.currentView = view;

      // Update toggle buttons
      document.querySelectorAll('.view-toggle-btn[data-view]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });

      // Show/hide views
      document.getElementById('boardView').classList.toggle('hidden', view !== 'board');
      document.getElementById('listView').classList.toggle('hidden', view !== 'list');

      renderAll();
    }

    // ── Search ──
    let searchTimeout;
    function onSearchInput(e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        state.searchQuery = e.target.value.trim();
        renderAll();
      }, 300);
    }

    // ── Filters ──
    function toggleStatusFilter(status) {
      state.filterStatus = state.filterStatus === status ? null : status;
      renderAll();
    }

    function toggleTypeFilter(type) {
      state.filterType = state.filterType === type ? null : type;
      renderAll();
    }

    // ── Dropdown toggle ──
    function toggleDropdown(dropdownId) {
      const dropdown = document.getElementById(dropdownId);
      const wasOpen = dropdown.classList.contains('open');
      // Close all dropdowns first
      document.querySelectorAll('.filter-dropdown.open').forEach(d => {
        d.classList.remove('open');
        d.querySelector('.filter-dropdown-btn').setAttribute('aria-expanded', 'false');
      });
      // Toggle the clicked one
      if (!wasOpen) {
        dropdown.classList.add('open');
        dropdown.querySelector('.filter-dropdown-btn').setAttribute('aria-expanded', 'true');
      }
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.filter-dropdown.open').forEach(d => {
        d.classList.remove('open');
        d.querySelector('.filter-dropdown-btn').setAttribute('aria-expanded', 'false');
      });
    }

    function updateFilterActive() {
      // Update dropdown items
      document.querySelectorAll('.filter-dropdown-item[data-filter-status]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filterStatus === state.filterStatus);
      });
      document.querySelectorAll('.filter-dropdown-item[data-filter-type]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filterType === state.filterType);
      });
      // Update dropdown button labels and highlight
      const statusBtn = document.getElementById('statusDropdownBtn');
      const statusLabel = document.getElementById('statusDropdownLabel');
      const typeBtn = document.getElementById('typeDropdownBtn');
      const typeLabel = document.getElementById('typeDropdownLabel');
      if (statusBtn) statusBtn.classList.toggle('has-active', !!state.filterStatus);
      if (statusLabel) statusLabel.textContent = state.filterStatus ? statusLabels[state.filterStatus] : 'Status';
      if (typeBtn) typeBtn.classList.toggle('has-active', !!state.filterType);
      if (typeLabel) typeLabel.textContent = state.filterType ? state.filterType.charAt(0).toUpperCase() + state.filterType.slice(1) : 'Type';
    }

    // ── Sorting (List view) ──
    function onSortClick(col) {
      if (state.sortBy === col) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortBy = col;
        state.sortDirection = 'asc';
      }
      renderListView();
    }

    // ── Drag & Drop: Board ──
    function onCardDragStart(e, id) {
      state.draggedId = id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    }

    function onCardDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      state.draggedId = null;
      document.querySelectorAll('.column-cards.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function onColumnDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }

    function onColumnDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function onColumnDrop(e, newStatus) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const project = projects.find(p => p.id === id);
      if (project && project.status !== newStatus) {
        project.status = newStatus;
        renderAll();
      }
    }

    // ── Drag & Drop: List (reorder) ──
    function onRowDragStart(e, id) {
      state.draggedId = id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
    }

    function onRowDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      state.draggedId = null;
      document.querySelectorAll('.list-table tbody tr.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function onRowDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const row = e.currentTarget;
      if (row.dataset.id !== state.draggedId) {
        row.classList.add('drag-over');
      }
    }

    function onRowDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function onRowDrop(e, targetId) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const draggedId = e.dataTransfer.getData('text/plain');
      if (draggedId === targetId) return;

      const dragIdx = projects.findIndex(p => p.id === draggedId);
      const targetIdx = projects.findIndex(p => p.id === targetId);
      if (dragIdx === -1 || targetIdx === -1) return;

      const [item] = projects.splice(dragIdx, 1);
      projects.splice(targetIdx, 0, item);
      renderListView();
    }

    // ── Detail Panel ──
    function openDetailPanel(id) {
      const project = projects.find(p => p.id === id);
      if (!project) return;

      state.selectedProject = id;
      document.getElementById('detailId').textContent = project.id;

      let bodyHtml = '';

      if (project.image) {
        bodyHtml += `<img src="${project.image}" alt="${escapeHtml(project.name)}" class="detail-image" />`;
      }

      bodyHtml += `
        <h2 class="detail-name">${escapeHtml(project.name)}</h2>
        <div class="detail-field">
          <div class="detail-field-label">Status</div>
          <span class="detail-status-badge ${project.status}">${statusLabels[project.status]}</span>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Type</div>
          <div class="detail-field-value">${project.type}</div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Description</div>
          <div class="detail-field-value">${escapeHtml(project.description)}</div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Tags</div>
          <div class="detail-tags">
            ${project.tags.map(t => `<span class="project-tag ${t}" style="font-size: var(--text-xs); padding: 2px 10px;">${t}</span>`).join('')}
          </div>
        </div>
      `;

      if (project.link) {
        bodyHtml += `
          <div class="detail-field">
            <div class="detail-field-label">Link</div>
            <a href="${project.link}" class="detail-link" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              View Project
            </a>
          </div>
        `;
      }

      document.getElementById('detailBody').innerHTML = bodyHtml;
      document.getElementById('detailOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailPanel() {
      document.getElementById('detailOverlay').classList.remove('open');
      document.body.style.overflow = '';
      state.selectedProject = null;
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      // Search
      document.getElementById('searchInput').addEventListener('input', onSearchInput);

      // View switching (topbar toggle)
      document.querySelectorAll('.view-toggle-btn[data-view]').forEach(btn => {
        btn.addEventListener('click', () => switchView(btn.dataset.view));
      });

      // Dropdown toggle buttons
      document.getElementById('statusDropdownBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown('statusDropdown');
      });
      document.getElementById('typeDropdownBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown('typeDropdown');
      });

      // Status filter items
      document.querySelectorAll('.filter-dropdown-item[data-filter-status]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleStatusFilter(btn.dataset.filterStatus);
          closeAllDropdowns();
        });
      });

      // Type filter items
      document.querySelectorAll('.filter-dropdown-item[data-filter-type]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleTypeFilter(btn.dataset.filterType);
          closeAllDropdowns();
        });
      });

      // Close dropdowns on click outside
      document.addEventListener('click', () => {
        closeAllDropdowns();
      });

      // Detail panel close
      document.getElementById('detailClose').addEventListener('click', closeDetailPanel);
      document.getElementById('detailBackdrop').addEventListener('click', closeDetailPanel);

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        // Escape closes detail panel or dropdowns
        if (e.key === 'Escape') {
          if (state.selectedProject) {
            closeDetailPanel();
          } else {
            closeAllDropdowns();
          }
        }

        // / to focus search (when not in an input)
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
          e.preventDefault();
          document.getElementById('searchInput').focus();
        }

        // Ctrl+K or Cmd+K to focus search
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          document.getElementById('searchInput').focus();
        }
      });

      // Initial render
      renderAll();
    });
  </script>
</body>

</html>
